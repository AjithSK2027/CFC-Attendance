<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Coffeeland FC | Premium Attendance Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        coffee: {
                            900: '#150E0A',
                            800: '#1E140F',
                            700: '#2C1D16',
                            accent: '#D4AF37',
                            accentHover: '#E5C158',
                            light: '#F5E6D3'
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 1.2s linear infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(18px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* ---------- PRODUCTION-GRADE MOBILE OPTIMIZATIONS ---------- */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #150E0A;
            color: #F5E6D3;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.04) 0%, transparent 50%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* improved glassmorphism with better contrast on mobile */
        .glass-panel {
            background: linear-gradient(145deg, rgba(30, 20, 15, 0.85) 0%, rgba(44, 29, 22, 0.5) 100%);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(212, 175, 55, 0.12);
            box-shadow: 0 10px 30px -8px rgba(0, 0, 0, 0.4);
        }

        .glass-input {
            background: rgba(21, 14, 10, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.25);
            transition: all 0.25s ease;
            font-size: 0.95rem;
        }

        .glass-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
            outline: none;
        }

        .btn-premium {
            background: linear-gradient(135deg, #D4AF37 0%, #B89328 100%);
            color: #150E0A;
            border: none;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 6px 14px rgba(212, 175, 55, 0.2);
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .btn-premium:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-premium:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #E5C158 0%, #C9A439 100%);
        }
        
        .btn-premium:disabled {
            opacity: 0.75;
            cursor: not-allowed;
            filter: grayscale(0.05);
        }

        .btn-secondary {
            background: rgba(30, 20, 15, 0.75);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #F5E6D3;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-secondary:active {
            transform: scale(0.96);
            background: rgba(212, 175, 55, 0.2);
        }

        /* Premium Toggle - optimized for touch */
        .premium-toggle {
            display: inline-flex;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .premium-toggle input {
            display: none;
        }

        .toggle-track {
            width: 52px;
            height: 26px;
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.55);
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            align-items: center;
        }

        .toggle-thumb {
            width: 20px;
            height: 20px;
            background-color: #EF4444;
            border-radius: 50%;
            position: absolute;
            left: 3px;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .premium-toggle input:checked + .toggle-track {
            background-color: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.65);
        }

        .premium-toggle input:checked + .toggle-track .toggle-thumb {
            background-color: #10B981;
            transform: translateX(26px);
        }

        /* custom scrollbar remains but thin */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(30, 20, 15, 0.6);
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.4);
            border-radius: 6px;
        }
        
        /* modern loader */
        .modern-loader {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(212, 175, 55, 0.15);
            border-radius: 50%;
            border-top-color: #D4AF37;
            animation: spin 0.9s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* list items animation */
        .list-item-enter {
            animation: fadeInUp 0.35s ease-out forwards;
        }
        
        /* improved summary stats */
        .summary-stat {
            background: rgba(21, 14, 10, 0.65);
            border-radius: 2rem;
            padding: 0.3rem 0.9rem;
            backdrop-filter: blur(4px);
            font-size: 0.8rem;
        }

        /* better touch targets on mobile */
        @media (max-width: 640px) {
            .toggle-track {
                width: 50px;
                height: 26px;
            }
            .toggle-thumb {
                width: 20px;
                height: 20px;
            }
            .premium-toggle input:checked + .toggle-track .toggle-thumb {
                transform: translateX(24px);
            }
            .btn-premium, .btn-secondary {
                padding-left: 0.9rem;
                padding-right: 0.9rem;
            }
            .glass-panel {
                border-radius: 1.5rem;
            }
        }

        /* ensure long names break gracefully */
        .person-name {
            word-break: break-word;
            white-space: normal;
            line-height: 1.3;
        }

        /* make date input consistent */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7) sepia(1) hue-rotate(320deg) brightness(0.9);
            cursor: pointer;
        }
    </style>
</head>

<body class="min-h-screen p-3 sm:p-5 md:p-8 relative overflow-x-hidden selection:bg-coffee-accent/60 selection:text-coffee-900">

    <!-- Decorative accents (lighter on mobile for performance) -->
    <div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-coffee-accent/40 to-transparent"></div>
    <div class="fixed top-0 right-[-15%] w-[45%] h-[35%] bg-coffee-accent/5 blur-[100px] rounded-full pointer-events-none"></div>
    <div class="fixed bottom-[-5%] left-[-15%] w-[45%] h-[35%] bg-coffee-accent/5 blur-[100px] rounded-full pointer-events-none"></div>

    <div class="max-w-4xl mx-auto space-y-6 md:space-y-8 relative z-10">

        <!-- Header Section (mobile-first spacing) -->
        <header class="text-center space-y-3 md:space-y-4 animate-fade-in-up stagger-1">
            <div class="flex justify-center items-center gap-3 flex-wrap">
                <!-- Responsive logo -->
                <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" 
                     alt="Coffeeland FC Shield" 
                     class="h-12 sm:h-16 w-auto drop-shadow-[0_0_12px_rgba(212,175,55,0.3)] rounded-full border border-coffee-accent/30 p-1 bg-coffee-800/50">
                <div>
                    <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-coffee-light to-[#A89060] tracking-tight drop-shadow-sm">
                        Coffeeland FC
                    </h1>
                    <h2 class="text-base sm:text-xl md:text-2xl font-medium text-coffee-accent tracking-wide uppercase">Management App</h2>
                </div>
            </div>
            
            <div class="flex flex-wrap justify-center gap-2 text-[11px] sm:text-xs font-medium text-coffee-light/70">
                <span class="inline-flex items-center px-3 py-1 rounded-full border border-coffee-light/10 bg-coffee-light/5 backdrop-blur-sm">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-2 animate-pulse"></span>
                    LIVE SYNC
                </span>
                <span class="inline-flex items-center px-3 py-1 rounded-full border border-coffee-light/10 bg-coffee-light/5 backdrop-blur-sm">
                    <svg class="w-3.5 h-3.5 mr-1.5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                    G-SHEETS
                </span>
            </div>
        </header>

        <!-- Batch Selection Panel (compact on mobile) -->
        <div class="glass-panel rounded-2xl p-5 sm:p-6 md:p-7 animate-fade-in-up stagger-2 relative overflow-hidden">
            <div class="flex items-center mb-4 border-b border-coffee-light/10 pb-3">
                <div class="w-7 h-7 rounded-lg bg-coffee-accent/10 flex items-center justify-center mr-2.5 border border-coffee-accent/20">
                    <svg class="w-4 h-4 text-coffee-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <h3 class="text-base sm:text-lg font-semibold text-white tracking-wide uppercase">Batch Configuration</h3>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-[11px] font-semibold mb-1.5 text-coffee-light/70 uppercase tracking-wider pl-1">Target Batch</label>
                    <select id="batchSelect"
                        class="glass-input w-full rounded-xl py-3 px-4 text-white appearance-none cursor-pointer pr-9 text-sm">
                        <option value="" class="bg-coffee-800 text-white">-- Authenticating & Loading --</option>
                    </select>
                </div>
                <button onclick="fetchRoster()" id="loadBtn"
                    class="btn-premium font-semibold py-3 px-6 rounded-xl w-full sm:w-auto flex items-center justify-center gap-2 min-w-[160px] transition">
                    <svg class="w-5 h-5 text-coffee-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span>Initialize Session</span>
                </button>
            </div>
        </div>

        <!-- Loading Indicator (centered) -->
        <div id="loadingIndicator" class="hidden flex-col items-center justify-center py-12 animate-fade-in-up">
            <div class="modern-loader mb-3"></div>
            <p class="text-coffee-accent/70 text-xs font-medium tracking-wider uppercase animate-pulse">Syncing Database...</p>
        </div>

        <!-- Roster Panel (mobile adjusted spacing) -->
        <div id="rosterPanel" class="hidden glass-panel rounded-2xl p-5 sm:p-6 md:p-7 space-y-5 animate-fade-in-up">

            <!-- Date & action row -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-coffee-light/10 pb-5 gap-4">
                <div class="flex items-center">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-coffee-accent/20 to-transparent flex items-center justify-center mr-3 border border-coffee-accent/30">
                        <svg class="w-4.5 h-4.5 text-coffee-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-xl sm:text-2xl font-semibold text-white tracking-tight">Active Roster</h3>
                        <p class="text-xs text-coffee-light/40 mt-0.5">Mark attendance for selected batch</p>
                    </div>
                </div>
                
                <div class="relative w-full md:w-56">
                    <label class="sr-only">Session date</label>
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-coffee-accent/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <input type="date" id="attendanceDate"
                        class="glass-input text-white rounded-xl py-2.5 pl-9 pr-3 w-full cursor-pointer font-medium text-sm">
                </div>
            </div>

            <!-- Action Buttons Group (mobile friendly) -->
            <div class="flex flex-wrap gap-2 justify-start items-center border-b border-coffee-light/10 pb-4">
                <button id="markAllPresentBtn" class="btn-premium text-xs sm:text-sm font-semibold py-2 px-4 rounded-full flex items-center gap-1.5 shadow-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Mark All Present
                </button>
                <button id="markAllAbsentBtn" class="btn-secondary text-xs sm:text-sm font-semibold py-2 px-4 rounded-full flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    All Absent
                </button>
                <button id="clearAllBtn" class="btn-secondary text-xs sm:text-sm font-semibold py-2 px-4 rounded-full flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Clear All
                </button>
            </div>

            <!-- DYNAMIC SUMMARY SECTION (mobile optimized) -->
            <div id="attendanceSummary" class="bg-coffee-800/50 rounded-xl p-3 border border-coffee-accent/25 backdrop-blur-sm">
                <div class="flex flex-col sm:flex-row sm:flex-wrap justify-between items-start sm:items-center gap-2 text-xs md:text-sm">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 rounded-full bg-coffee-accent animate-pulse"></div>
                        <span class="font-bold text-coffee-accent text-[11px] sm:text-xs uppercase tracking-wide">📊 BATCH REPORT</span>
                    </div>
                    <div id="summaryContent" class="flex flex-wrap gap-2 md:gap-4 text-coffee-light/90 font-medium">
                        <span class="summary-stat">👥 Coaches: <span id="coachPresentCount" class="font-bold text-coffee-accent">0</span></span>
                        <span class="summary-stat">🎓 Students: <span id="studentPresentCount" class="font-bold text-emerald-400">0</span> / <span id="studentTotalCount">0</span></span>
                        <span class="summary-stat">❌ Absent: <span id="studentAbsentCount" class="text-rose-300">0</span></span>
                    </div>
                </div>
            </div>

            <!-- Coaches List -->
            <div class="animate-fade-in-up">
                <div class="flex items-center mb-3">
                    <span class="w-2 h-2 rounded-full bg-coffee-accent mr-2 shadow-[0_0_6px_rgba(212,175,55,0.7)]"></span>
                    <h4 class="text-coffee-accent font-semibold uppercase tracking-wider text-[11px] sm:text-xs">Coaches</h4>
                </div>
                <div class="bg-coffee-800/30 rounded-xl p-1.5 border border-coffee-light/5">
                    <div id="coachesList" class="space-y-2 grid grid-cols-1 gap-y-2"></div>
                </div>
            </div>

            <!-- Students List -->
            <div class="animate-fade-in-up">
                <div class="flex items-center mb-3 mt-1">
                    <span class="w-2 h-2 rounded-full bg-sky-400 mr-2 shadow-[0_0_6px_rgba(56,189,248,0.6)]"></span>
                    <h4 class="text-sky-400 font-semibold uppercase tracking-wider text-[11px] sm:text-xs">Students</h4>
                </div>
                <div class="bg-coffee-800/30 rounded-xl p-1.5 border border-coffee-light/5">
                    <div id="studentsList" class="space-y-2 grid grid-cols-1 gap-y-2"></div>
                </div>
            </div>

            <!-- Submit Button (enlarged touch zone) -->
            <div class="pt-4 border-t border-coffee-light/10 mt-1">
                <button onclick="submitAttendance()" id="submitBtn"
                    class="btn-premium w-full font-bold py-3.5 sm:py-4 rounded-xl text-base sm:text-lg flex items-center justify-center gap-3 shadow-xl active:scale-[0.98] transition">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6 text-coffee-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    <span>Commit Attendance Log</span>
                </button>
            </div>
        </div>

        <!-- Success Message (adaptive padding) -->
        <div id="successMsg"
            class="hidden animate-fade-in-up glass-panel border-l-4 border-l-emerald-500 overflow-hidden">
            <div class="px-5 py-4 relative z-10 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-emerald-500/20 flex items-center justify-center border border-emerald-500/30">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <div>
                        <h4 class="text-emerald-400 font-bold text-sm sm:text-base">Transmission Successful</h4>
                        <p class="text-emerald-200/60 text-[11px] sm:text-xs mt-0.5">Database synchronized with Google Sheets.</p>
                    </div>
                </div>
                <button onclick="document.getElementById('successMsg').classList.add('hidden')" class="text-emerald-400/50 hover:text-emerald-400 transition-colors p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CORE LOGIC (unchanged functionality, only responsive UI enhancers)
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw_wlKt4l6iBIUeW6IJKaP5LC_ostTmrHOZZbeUZYfJ4dJu2OZgem1ChSz7KFB7P3_giQ/exec";

        document.getElementById('attendanceDate').valueAsDate = new Date();

        window.onload = async () => {
            const select = document.getElementById('batchSelect');
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getBatches`, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                select.innerHTML = '<option value="" class="bg-coffee-800">-- Select a processing batch --</option>';
                if (data.batches) {
                    data.batches.forEach(b => {
                        select.innerHTML += `<option value="${b.id}" class="bg-coffee-800">${b.name}</option>`;
                    });
                }
            } catch (err) {
                console.error("Error loading batches:", err);
                select.innerHTML = '<option value="" class="bg-coffee-800">⚠️ Error loading batches</option>';
            }
        };

        function updateAttendanceSummary() {
            const coachCheckboxes = document.querySelectorAll('input[name="attendance_coach"]');
            const studentCheckboxes = document.querySelectorAll('input[name="attendance_student"]');
            const coachesPresent = Array.from(coachCheckboxes).filter(cb => cb.checked).length;
            const studentsTotal = studentCheckboxes.length;
            const studentsPresent = Array.from(studentCheckboxes).filter(cb => cb.checked).length;
            const studentsAbsent = studentsTotal - studentsPresent;
            document.getElementById('coachPresentCount').innerText = coachesPresent;
            document.getElementById('studentPresentCount').innerText = studentsPresent;
            document.getElementById('studentTotalCount').innerText = studentsTotal;
            document.getElementById('studentAbsentCount').innerText = studentsAbsent;
        }

        function applyToAllCheckboxes(setChecked) {
            const allCheckboxes = document.querySelectorAll('input[name="attendance_coach"], input[name="attendance_student"]');
            allCheckboxes.forEach(cb => {
                cb.checked = setChecked;
                const checkIcon = document.getElementById(`check_${cb.id}`);
                if (checkIcon) {
                    if (setChecked) {
                        checkIcon.classList.remove('opacity-0', 'scale-50');
                        checkIcon.classList.add('opacity-100', 'scale-100');
                    } else {
                        checkIcon.classList.remove('opacity-100', 'scale-100');
                        checkIcon.classList.add('opacity-0', 'scale-50');
                    }
                }
            });
            updateAttendanceSummary();
        }

        async function fetchRoster() {
            const batchName = document.getElementById('batchSelect').value;
            const btn = document.getElementById('loadBtn');
            if (!batchName) return;
            document.getElementById('rosterPanel').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('loadingIndicator').classList.add('flex');
            const originalBtnContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-coffee-900/30 border-t-coffee-900 rounded-full animate-spin"></div>';
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}`, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                renderList('coachesList', data.coaches, 'coach');
                renderList('studentsList', data.students, 'student');
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('rosterPanel').classList.remove('hidden');
                attachGlobalChangeListener();
                updateAttendanceSummary();
            } catch (err) {
                console.error("Error fetching roster:", err);
                document.getElementById('loadingIndicator').classList.add('hidden');
                alert("Comm-link failed. Unable to fetch roster data.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnContent;
            }
        }

        function attachGlobalChangeListener() {
            const container = document.getElementById('rosterPanel');
            if (container && !container.hasAttribute('data-listener-attached')) {
                container.addEventListener('change', (e) => {
                    if (e.target && e.target.type === 'checkbox' && (e.target.name === 'attendance_coach' || e.target.name === 'attendance_student')) {
                        updateAttendanceSummary();
                    }
                });
                container.setAttribute('data-listener-attached', 'true');
            }
        }

        function renderList(containerId, people, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (!people || people.length === 0) {
                container.innerHTML = `<div class="col-span-full py-5 text-center text-coffee-light/30 border border-dashed border-coffee-light/10 rounded-xl text-sm">📭 No roster data</div>`;
                return;
            }
            people.forEach((person, index) => {
                const id = `${type}_${index}`;
                container.innerHTML += `
                    <div class="list-item-enter opacity-0 flex justify-between items-center group bg-coffee-800/40 hover:bg-coffee-700/50 p-3 rounded-xl border border-coffee-light/5 hover:border-coffee-accent/30 transition-all duration-200">
                        <div class="flex items-center space-x-3 overflow-hidden pr-2">
                            <div class="w-8 h-8 rounded-full bg-coffee-900/70 flex-shrink-0 flex items-center justify-center border border-coffee-light/15">
                                <span class="text-xs font-bold text-coffee-light/80">${person.name.charAt(0).toUpperCase()}</span>
                            </div>
                            <span class="person-name text-sm font-medium text-coffee-light/90 max-w-[160px] sm:max-w-[200px] break-words" title="${person.name}">${person.name}</span>
                        </div>
                        <label class="premium-toggle">
                            <input type="checkbox" name="attendance_${type}" id="${id}" value="${person.name}" checked />
                            <div class="toggle-track">
                                <div class="toggle-thumb flex items-center justify-center">
                                    <svg class="w-3 h-3 text-white transition-all duration-200 opacity-100 scale-100" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="check_${id}"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </div>
                        </label>
                    </div>
                `;
            });
            setTimeout(() => {
                people.forEach((_, index) => {
                    const id = `${type}_${index}`;
                    const cb = document.getElementById(id);
                    const checkIcon = document.getElementById(`check_${id}`);
                    if(cb && checkIcon) {
                        const updateIcon = () => {
                            if(cb.checked) {
                                checkIcon.classList.remove('opacity-0', 'scale-50');
                                checkIcon.classList.add('opacity-100', 'scale-100');
                            } else {
                                checkIcon.classList.remove('opacity-100', 'scale-100');
                                checkIcon.classList.add('opacity-0', 'scale-50');
                            }
                            updateAttendanceSummary();
                        };
                        updateIcon();
                        cb.addEventListener('change', updateIcon);
                    }
                });
                updateAttendanceSummary();
            }, 40);
        }

        async function submitAttendance() {
            const batchName = document.getElementById('batchSelect').value;
            const date = document.getElementById('attendanceDate').value;
            const btn = document.getElementById('submitBtn');
            if (!batchName || !date) { alert("Missing batch or execution date."); return; }
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="flex items-center gap-2"><div class="w-4 h-4 border-2 border-coffee-900/40 border-t-coffee-900 rounded-full animate-spin"></div><span>Transmitting...</span></div>`;
            const records = [];
            document.querySelectorAll('input[name="attendance_coach"]').forEach(input => { records.push({ personType: 'coach', date, batchName, personName: input.value, status: input.checked ? 'Present' : 'Absent' }); });
            document.querySelectorAll('input[name="attendance_student"]').forEach(input => { records.push({ personType: 'student', date, batchName, personName: input.value, status: input.checked ? 'Present' : 'Absent' }); });
            const payload = { action: "saveAttendance", data: records };
            const formData = new URLSearchParams();
            formData.append('payload', JSON.stringify(payload));
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', redirect: 'follow', headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: formData });
                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('rosterPanel').classList.add('hidden');
                    const successDiv = document.getElementById('successMsg');
                    successDiv.classList.remove('hidden');
                    setTimeout(() => { successDiv.classList.add('hidden'); document.getElementById('batchSelect').value = ''; }, 5000);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else { alert("Transmission Error: " + (result.error || "Unknown error")); }
            } catch (err) { console.error(err); alert("Critical Failure: Data not saved."); } 
            finally { btn.disabled = false; btn.innerHTML = originalContent; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('markAllPresentBtn')?.addEventListener('click', () => applyToAllCheckboxes(true));
            document.getElementById('markAllAbsentBtn')?.addEventListener('click', () => applyToAllCheckboxes(false));
            document.getElementById('clearAllBtn')?.addEventListener('click', () => applyToAllCheckboxes(false));
        });
    </script>
</body>

</html>
