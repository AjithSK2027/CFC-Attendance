<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Coffeeland FC | Attendance Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#08D9D6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CFC Manager">
    <link rel="apple-touch-icon" href="https://i.ibb.co/F4xc84TQ/KM.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Poppins', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s;
            overflow-x: hidden;
        }
        :root {
            --bg: #EAEAEA;
            --surface: rgba(255,255,255,0.85);
            --surface-strong: #ffffff;
            --text: #252A34;
            --text-muted: #5a6874;
            --border: rgba(37,42,52,0.08);
            --primary: #08D9D6;
            --primary-hover: #06b6b3;
            --secondary: #08D9D6;
            --secondary-hover: #06b6b3;
            --accent-bg: #08D9D6;
            --accent-text: #252A34;
            --danger: #FF2E63;
            --danger-hover: #e02454;
            --mint-green: #98FB98;
            --mint-green-hover: #7ddf7d;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 8px -2px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 12px 20px -8px rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1e26;
                --surface: rgba(30,34,42,0.85);
                --surface-strong: #252a34;
                --text: #EAEAEA;
                --text-muted: #a0aab8;
                --border: rgba(8,217,214,0.2);
                --primary: #08D9D6;
                --primary-hover: #2ce4e1;
                --secondary: #08D9D6;
                --danger: #FF2E63;
                --mint-green: #5fbf5f;
                --mint-green-hover: #4aa34a;
            }
        }
        /* Loader – unchanged */
        .main-fader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s;
        }
        .main-fader.hidden { opacity: 0; visibility: hidden; }
        .loader svg { height: 100px; margin: 0 auto; }
        .loader svg path { animation: pulse 1s infinite; fill: #08D9D6; }
        .loader svg path:nth-child(1) { animation-delay: -0.125s; }
        .loader svg path:nth-child(2) { animation-delay: -0.25s; }
        .loader svg path:nth-child(3) { animation-delay: -0.375s; }
        .loader svg path:nth-child(4) { animation-delay: -0.5s; }
        .loader svg path:nth-child(5) { animation-delay: -0.625s; }
        .loader svg path:nth-child(6) { animation-delay: -0.75s; }
        .loader svg path:nth-child(7) { animation-delay: -0.875s; }
        .loader svg path:nth-child(8) { animation-delay: -1s; }
        @keyframes pulse {
            0% { opacity: 0.1; }
            30% { opacity: 0.8; }
            100% { opacity: 0.1; }
        }
        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .panel-solid {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .app-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: color-mix(in srgb, var(--bg) 85%, transparent);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-main {
            padding: 24px 20px 40px;
            max-width: 640px;
            margin: 0 auto;
        }
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            flex: 1;
            background: var(--surface-strong);
            border-radius: 28px;
            padding: 16px;
            border-left: 4px solid;
            box-shadow: var(--shadow-md);
        }
        .stat-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text);
        }
        .inventory-card {
            background: var(--surface-strong);
            border-radius: 28px;
            padding: 18px 16px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }
        .inventory-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .inventory-row {
            display: flex;
            gap: 24px;
            justify-content: space-between;
        }
        .inventory-item {
            flex: 1;
            text-align: center;
        }
        .inventory-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        .inventory-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .inventory-control button {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            background: rgba(0,0,0,0.05);
            font-size: 20px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .inventory-control input {
            width: 60px;
            text-align: center;
            background: transparent;
            font-size: 20px;
            font-weight: 700;
            border: none;
            padding: 4px;
        }
        .holiday-btn {
            width: 100%;
            background: rgba(255,46,99,0.08);
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 40px;
            padding: 12px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 24px;
            cursor: pointer;
        }
        .filter-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }
        .filter-row select {
            flex: 2;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }
        .filter-row input {
            flex: 1;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 12px 12px;
            font-size: 14px;
        }
        .refresh-icon {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 40px;
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .refresh-icon:active { transform: rotate(180deg); }
        .search-input {
            width: 100%;
            margin-bottom: 24px;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 14px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 4px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .section-actions button {
            font-size: 10px;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .btn-all-present { background: var(--primary); color: #252A34; }
        .btn-all-absent { background: var(--danger); color: white; }
        .attendance-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-strong);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-left: 4px solid var(--danger);
            transition: 0.1s;
            box-shadow: var(--shadow-sm);
        }
        .attendance-card.present-card {
            border-left-color: var(--primary);
        }
        .player-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 2px;
        }
        .player-id {
            font-size: 10px;
            opacity: 0.6;
            font-family: monospace;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
            flex-shrink: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--danger);
            transition: 0.2s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .whatsapp-row {
            background: var(--surface-strong);
            border-radius: 28px;
            padding: 16px;
            margin: 20px 0 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .whatsapp-row input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 14px;
            font-size: 13px;
        }
        .whatsapp-row button {
            background: var(--primary);
            color: #252A34;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 12px;
        }
        /* Action buttons: Commit bigger, WhatsApp smaller & mint */
        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-commit {
            flex: 2;
            background: var(--primary);
            color: #252A34;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-commit:active {
            transform: scale(0.97);
        }
        .btn-whatsapp {
            flex: 1;
            background: var(--mint-green);
            color: #252A34;
            border: none;
            border-radius: 40px;
            padding: 12px 10px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-whatsapp:active {
            transform: scale(0.97);
            background: var(--mint-green-hover);
        }
        .batch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 8px;
        }
        .batch-tile {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .batch-tile:active { transform: scale(0.97); }
        .batch-tile img {
            max-width: 80px;
            height: auto;
            margin: 0 auto 8px;
        }
        .batch-name {
            font-weight: 800;
            font-size: 14px;
            margin-top: 8px;
        }
        .hidden { display: none !important; }
        .text-muted { color: var(--text-muted); }
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            background: var(--surface-strong);
            backdrop-filter: blur(16px);
            border-left: 4px solid;
            border-radius: 20px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
        }
        .offline-indicator {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top));
            right: 16px;
            background: var(--danger);
            color: white;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: bold;
            z-index: 1001;
        }
        .sync-pending {
            position: fixed;
            bottom: 20px;
            right: 16px;
            background: var(--primary);
            color: #252A34;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: bold;
            z-index: 1001;
            cursor: pointer;
        }
        .search-result-item {
            background: var(--surface-strong);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .field { width: 100%; }
    </style>
</head>

    <div id="toastContainer" class="toast-container"></div>
    <div id="offlineIndicator" class="offline-indicator" style="display: none;">📡 Offline</div>
    <div id="syncPending" class="sync-pending" style="display: none;" onclick="manualSync()">⏳ Pending sync</div>

    <header class="app-header">
        <button onclick="goHome()" style="background: none; border: none; text-align: left;">
            <div class="font-extrabold leading-tight">
                Coffeeland FC<br>
                <span style="color: var(--primary); font-size: 11px;">Attendance Manager</span>
            </div>
        </button>
        <button onclick="showEditView()" class="glass text-xs font-bold px-4 py-2 rounded-full" style="color: var(--primary);">📝 Edit Logs</button>
    </header>

    <main class="app-main">
        <!-- LobbyView -->
        <section id="lobbyView">
            <div class="glass rounded-2xl p-5 mb-6">
                <select id="homeSelect" onchange="select(this.value)" class="field w-full mb-3">
                    <option value="">⚡ Quick Select Batch ...</option>
                </select>
                <input type="text" id="globalPlayerSearch" oninput="globalSearchPlayers()" placeholder="🔍 Search any player or coach across all batches..." class="field w-full mb-3">
                <div id="globalSearchResults" class="hidden mt-2"></div>
                <button onclick="markGlobalHoliday()" class="w-full rounded-full py-3 text-xs font-black uppercase" style="background: rgba(255,46,99,0.15); color: var(--danger); border: 1px solid var(--danger);">🌴 Global Holiday (Today)</button>
            </div>
            <div id="Grid" class="batch-grid"></div>
        </section>

        <!-- Command / Attendance View -->
        <section id="commandView" class="hidden">
            <div class="stats-row">
                <div class="stat-card" style="border-left-color: var(--primary);">
                    <div class="stat-label">Athletes</div>

<script>
// ==================== ALL ORIGINAL JAVASCRIPT (100% UNCHANGED) ====================
let db = null;
const DB_NAME = 'CFC_OfflineDB';
const STORE_NAME = 'attendanceQueue';
let isOnline = navigator.onLine;

function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
            db = request.result;
            resolve(db);
        };
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { autoIncrement: true });
            }
        };
    });
}

async function addToQueue(record) {
    if (!db) await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.add(record);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

async function getAllQueue() {
    if (!db) await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
    });
}

async function clearQueue() {
    if (!db) await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.clear();
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

async function syncPendingRecords() {
    if (!isOnline) return;
    const queue = await getAllQueue();
    if (queue.length === 0) {
        document.getElementById('syncPending').style.display = 'none';
        return;
    }
    document.getElementById('syncPending').innerText = `⏳ Syncing (${queue.length})`;
    let successCount = 0;
    for (const record of queue) {
        try {
            const formData = new URLSearchParams();
            formData.append('payload', JSON.stringify({ action: 'saveAttendance', data: record.records }));
            await fetch(WEB_APP_URL, { method: 'POST', body: formData });
            successCount++;
        } catch(e) { console.warn('Sync failed for one record', e); }
    }
    if (successCount === queue.length) {
        await clearQueue();
        showToast(`✓ Synced ${successCount} attendance records`, 'success');
        document.getElementById('syncPending').style.display = 'none';
    } else {
        showToast(`Synced ${successCount}/${queue.length} records. Retry later.`, 'error');
        document.getElementById('syncPending').innerText = `⏳ Pending (${queue.length - successCount})`;
    }
}

async function manualSync() {
    if (!isOnline) {
        showToast('No internet connection', 'error');
        return;
    }
    await syncPendingRecords();
}

window.addEventListener('online', async () => {
    isOnline = true;
    document.getElementById('offlineIndicator').style.display = 'none';
    showToast('Back online – syncing pending records', 'success');
    await syncPendingRecords();
});
window.addEventListener('offline', () => {
    isOnline = false;
    document.getElementById('offlineIndicator').style.display = 'block';
    showToast('You are offline – attendance will be saved locally', 'error');
});

window.submitAttendance = async function() {
    const batchName = document.getElementById('Select').value;
    const date = document.getElementById('attendanceDate').value;
    if (!batchName) return showToast('Select batch', 'error');
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    
    const records = [];
    for (const type of ['coach', 'student']) {
        document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(input => {
            records.push({
                personType: type,
                studentId: input.dataset.sid || '',
                date: date,
                batchName: batchName,
                personName: input.value,
                status: input.checked ? 'Present' : 'Absent',
                ballsTaken: document.getElementById('ballsTaken').value,
                ballsLeft: document.getElementById('ballsLeft').value
            });
        });
    }
    
    if (!isOnline) {
        await addToQueue({ records, timestamp: Date.now() });
        showToast('Offline: Attendance saved locally. Will sync when online.', 'success');
        btn.innerText = "✓ Saved Offline";
        const pendingCount = (await getAllQueue()).length;
        if (pendingCount > 0) {
            document.getElementById('syncPending').innerText = `⏳ Pending (${pendingCount})`;
            document.getElementById('syncPending').style.display = 'block';
        }
        setTimeout(() => {
            goHome();
            btn.disabled = false;
            btn.innerText = "Commit Records";
        }, 800);
        return;
    }
    
    btn.innerText = "Syncing...";
    try {
        const formData = new URLSearchParams();
        formData.append('payload', JSON.stringify({ action: 'saveAttendance', data: records }));
        await fetch(WEB_APP_URL, { method: 'POST', body: formData });
        showToast('Attendance saved ✓', 'success');
        goHome();
    } catch (err) {
        await addToQueue({ records, timestamp: Date.now() });
        showToast('Network error – saved offline. Will retry later.', 'error');
        const pendingCount = (await getAllQueue()).length;
        if (pendingCount > 0) {
            document.getElementById('syncPending').innerText = `⏳ Pending (${pendingCount})`;
            document.getElementById('syncPending').style.display = 'block';
        }
        goHome();
    } finally {
        btn.disabled = false;
        btn.innerText = "Commit Records";
    }
};

async function refreshCurrentRoster() {
    const batchName = document.getElementById('Select').value;
    const date = document.getElementById('attendanceDate').value;
    if (!batchName) {
        showToast('No batch selected', 'error');
        return;
    }
    const refreshBtn = document.querySelector('.refresh-icon');
    refreshBtn.style.opacity = '0.5';
    refreshBtn.disabled = true;
    try {
        const cacheKey = getRosterCacheKey(batchName, date);
        const newData = await fetchJson(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}&date=${encodeURIComponent(date)}`);
        renderRosterData(newData);
        sessionStorage.setItem(cacheKey, JSON.stringify(newData));
        showToast('Roster refreshed from server', 'success');
    } catch (err) {
        showToast('Failed to refresh roster', 'error');
    } finally {
        refreshBtn.style.opacity = '1';
        refreshBtn.disabled = false;
    }
}

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOE5N7bji1t3ck7VA1GU-pDZNE0RXY6k1RIWcRibi1npvNHaBRP188Cn5yc6sEy0NZ/exec";
let cachedBatches = null;
const BATCHES_STORAGE_KEY = 'coffeeland_batches';
let allRostersCache = {};
let isPreloadingRosters = false;
let currentBatchName = '';
let currentDate = '';

const batchImageMap = {
    "Xavier's School": "https://i.ibb.co/R4Scn50S/XS.png",
    "Monti Angels": "https://i.ibb.co/q3pVFtc2/MA.png",
    "District Field Morning": "https://i.ibb.co/TDXGh0nf/DM.png",
    "District Field Evening": "https://i.ibb.co/Dfy39RzN/DE.png",
    "Kalyan Nagar Evening": "https://i.ibb.co/QFjBWcNQ/KE.png",
    "Kalyan Nagar Morning": "https://i.ibb.co/F4xc84TQ/KM.png"
};

let whatsappNumber = localStorage.getItem('whatsappNumber') || '+918867742269';
document.getElementById('whatsappNumber').value = whatsappNumber;

function saveWhatsAppNumber() {
    let num = document.getElementById('whatsappNumber').value.trim();
    if (!num) return showToast('Enter a WhatsApp number', 'error');
    if (!/^[\+\d\s\-]+$/.test(num)) {
        showToast('Invalid number format', 'error');
        return;
    }
    localStorage.setItem('whatsappNumber', num);
    whatsappNumber = num;
    showToast('WhatsApp number saved', 'success');
}

function vibrate() {
    if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(10);
    }
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    let borderColor = '#08D9D6';
    if (type === 'success') borderColor = '#08D9D6';
    if (type === 'error') borderColor = '#FF2E63';
    toast.style.borderLeftColor = borderColor;
    toast.innerHTML = `<div class="flex items-center gap-2"><span>${message}</span></div>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
}

function setLoading(elementId, isLoading, skeletonCount = 3) {
    const el = document.getElementById(elementId);
    if (!el) return;
    if (isLoading) {
        const skeletons = Array(skeletonCount).fill(0).map(() => `<div class="skeleton h-16 w-full mb-2"></div>`).join('');
        el.innerHTML = `<div class="space-y-2">${skeletons}</div>`;
    }
}

function hideLoader() {
    const loader = document.getElementById('splashLoader');
    if (loader) loader.classList.add('hidden');
}

function goHome() {
    document.getElementById('lobbyView').classList.remove('hidden');
    document.getElementById('commandView').classList.add('hidden');
    document.getElementById('editView').classList.add('hidden');
    document.getElementById('globalPlayerSearch').value = '';
    document.getElementById('globalSearchResults').classList.add('hidden');
    currentBatchName = '';
    currentDate = '';
}

function showEditView() {
    document.getElementById('lobbyView').classList.add('hidden');
    document.getElementById('commandView').classList.add('hidden');
    document.getElementById('editView').classList.remove('hidden');
    document.getElementById('editDate').valueAsDate = new Date();
    loadDailyLogs();
}

function select(batchName) {
    if (!batchName) return;
    document.getElementById('Select').value = batchName;
    fetchRoster();
}

function adjustInventory(id, delta) {
    const input = document.getElementById(id);
    let val = parseInt(input.value) || 0;
    input.value = Math.max(0, val + delta);
}

async function fetchJson(url, options = {}) {
    const res = await fetch(url, options);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
}

function saveBatchesToCache(batches) {
    try {
        localStorage.setItem(BATCHES_STORAGE_KEY, JSON.stringify(batches));
    } catch(e) { console.warn('Failed to cache batches', e); }
}

function loadBatchesFromCache() {
    try {
        const cached = localStorage.getItem(BATCHES_STORAGE_KEY);
        if (cached) return JSON.parse(cached);
    } catch(e) {}
    return null;
}

async function preloadAllRosters() {
    if (isPreloadingRosters) return;
    isPreloadingRosters = true;
    const date = new Date().toISOString().slice(0,10);
    const batches = cachedBatches || [];
    const promises = batches.map(async (batch) => {
        const batchName = batch.name.trim();
        try {
            const data = await fetchJson(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}&date=${encodeURIComponent(date)}`);
            allRostersCache[batchName] = {
                coaches: data.coaches || [],
                students: data.students || []
            };
        } catch(e) {
            console.warn(`Failed to preload roster for ${batchName}`, e);
            allRostersCache[batchName] = { coaches: [], students: [] };
        }
    });
    await Promise.all(promises);
    isPreloadingRosters = false;
}

async function globalSearchPlayers() {
    const query = document.getElementById('globalPlayerSearch').value.trim().toLowerCase();
    const resultsDiv = document.getElementById('globalSearchResults');
    if (!query) {
        resultsDiv.classList.add('hidden');
        resultsDiv.innerHTML = '';
        return;
    }
    if (Object.keys(allRostersCache).length === 0 && cachedBatches && cachedBatches.length) {
        resultsDiv.classList.remove('hidden');
        resultsDiv.innerHTML = '<div class="text-center py-4 text-xs opacity-60">Loading all players...</div>';
        await preloadAllRosters();
    }
    const matches = [];
    for (const [batchName, roster] of Object.entries(allRostersCache)) {
        roster.coaches.forEach(coach => {
            if (coach.name.toLowerCase().includes(query)) {
                matches.push({ name: coach.name, batch: batchName, type: 'Coach', studentId: coach.studentId });
            }
        });
        roster.students.forEach(student => {
            if (student.name.toLowerCase().includes(query)) {
                matches.push({ name: student.name, batch: batchName, type: 'Athlete', studentId: student.studentId });
            }
        });
    }
    if (matches.length === 0) {
        resultsDiv.innerHTML = '<div class="text-center py-4 text-xs opacity-60">No players found</div>';
        resultsDiv.classList.remove('hidden');
        return;
    }
    const html = matches.slice(0, 10).map(m => `
        <div onclick="goToBatchAndSearch('${escapeHtml(m.batch)}', '${escapeHtml(m.name)}')" class="search-result-item glass p-3 rounded-xl cursor-pointer flex justify-between items-center">
            <div>
                <p class="font-bold text-sm">${escapeHtml(m.name)}</p>
                <p class="text-[9px] opacity-60">${escapeHtml(m.batch)} • ${m.type}</p>
            </div>
            <span class="text-primary text-xs">→</span>
        </div>
    `).join('');
    resultsDiv.innerHTML = html;
    resultsDiv.classList.remove('hidden');
}

function goToBatchAndSearch(batchName, playerName) {
    const selectEl = document.getElementById('Select');
    selectEl.value = batchName;
    fetchRoster().then(() => {
        const searchInput = document.getElementById('rosterSearch');
        searchInput.value = playerName;
        applyRosterSearch();
        document.getElementById('globalSearchResults').classList.add('hidden');
        document.getElementById('globalPlayerSearch').value = '';
    });
}

const ROSTER_CACHE_PREFIX = 'roster_';
function getRosterCacheKey(batchName, date) {
    return ROSTER_CACHE_PREFIX + batchName.replace(/\s/g, '_') + '_' + date;
}

async function fetchRoster() {
    const batchName = document.getElementById('Select').value;
    const date = document.getElementById('attendanceDate').value;
    if (!batchName) { showToast('Please select a batch', 'error'); return; }
    currentBatchName = batchName;
    currentDate = date;

    document.getElementById('lobbyView').classList.add('hidden');
    document.getElementById('commandView').classList.remove('hidden');
    document.getElementById('holidayBtnDate').innerText = `(${new Date(date).toLocaleDateString('en-GB', {day:'numeric', month:'short'})})`;

    const cacheKey = getRosterCacheKey(batchName, date);
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
        try {
            const data = JSON.parse(cached);
            renderRosterData(data);
            refreshRosterInBackground(batchName, date, cacheKey);
            return;
        } catch(e) { console.warn('Cache parse error', e); }
    }
    setLoading('coachesList', true);
    setLoading('studentsList', true);
    await fetchAndRenderRoster(batchName, date, cacheKey);
}

function renderRosterData(data) {
    renderList('coachesList', data.coaches, 'coach', 'Coaches', 'var(--danger)');
    renderList('studentsList', data.students, 'student', 'Athletes', 'var(--primary)');
    document.getElementById('ballsTaken').value = data.inventory?.taken || 0;
    document.getElementById('ballsLeft').value = data.inventory?.left || 0;
    const btn = document.getElementById('submitBtn');
    btn.innerText = data.isLogged ? "Update Session Log" : "Commit Records";
    btn.classList.remove('btn-primary', 'btn-secondary');
    if (data.isLogged) btn.classList.add('btn-secondary');
    else btn.classList.add('btn-primary');
    updateStats();
}

async function fetchAndRenderRoster(batchName, date, cacheKey) {
    try {
        const data = await fetchJson(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}&date=${encodeURIComponent(date)}`);
        renderRosterData(data);
        sessionStorage.setItem(cacheKey, JSON.stringify(data));
    } catch (err) {
        showToast('Failed to load roster', 'error');
        document.getElementById('coachesList').innerHTML = `<div class="text-center py-8 text-rose-500 text-xs font-bold">⚠️ Error loading data</div>`;
    }
}

async function refreshRosterInBackground(batchName, date, cacheKey) {
    try {
        const newData = await fetchJson(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}&date=${encodeURIComponent(date)}`);
        if (currentBatchName === batchName && currentDate === date) {
            const oldData = JSON.parse(sessionStorage.getItem(cacheKey) || '{}');
            if (JSON.stringify(oldData) !== JSON.stringify(newData)) {
                renderRosterData(newData);
                showToast('Roster updated with latest changes', 'success');
            }
        }
        sessionStorage.setItem(cacheKey, JSON.stringify(newData));
    } catch(e) { console.warn('Background refresh failed', e); }
}

async function loades() {
    await openDB();
    const cached = loadBatchesFromCache();
    if (cached && cached.length) {
        cachedBatches = cached;
        renderGrid(cachedBatches);
        populateBatchDropdowns(cachedBatches);
        hideLoader();
        refreshBatchesInBackground();
        preloadAllRosters().catch(console.warn);
        const pending = await getAllQueue();
        if (pending.length) {
            document.getElementById('syncPending').innerText = `⏳ Pending (${pending.length})`;
            document.getElementById('syncPending').style.display = 'block';
            if (isOnline) syncPendingRecords();
        }
        return;
    }
    await fetchFreshBatches();
}

async function fetchFreshBatches() {
    try {
        const data = await fetchJson(`${WEB_APP_URL}?action=getes`);
        cachedBatches = data.batches;
        renderGrid(data.batches);
        populateBatchDropdowns(data.batches);
        saveBatchesToCache(data.batches);
        hideLoader();
        preloadAllRosters().catch(console.warn);
    } catch (err) {
        console.error(err);
        showToast('Failed to load batches, refresh page', 'error');
        hideLoader();
    }
}

async function refreshBatchesInBackground() {
    try {
        const data = await fetchJson(`${WEB_APP_URL}?action=getes`);
        cachedBatches = data.batches;
        renderGrid(data.batches);
        populateBatchDropdowns(data.batches);
        saveBatchesToCache(data.batches);
    } catch(err) {
        console.warn('Background refresh failed', err);
    }
}

function populateBatchDropdowns(batches) {
    const homeSelect = document.getElementById('homeSelect');
    const batchSelect = document.getElementById('Select');
    const editBatchSelect = document.getElementById('editBatchSelect');
    [homeSelect, batchSelect, editBatchSelect].forEach(sel => { if(sel) sel.innerHTML = '<option value="">Select batch</option>'; });
    batches.forEach(b => {
        const name = b.name.trim();
        const opt = `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`;
        if (homeSelect) homeSelect.innerHTML += opt;
        if (batchSelect) batchSelect.innerHTML += opt;
        if (editBatchSelect) editBatchSelect.innerHTML += opt;
    });
}

function renderGrid(batches) {
    const grid = document.getElementById('Grid');
    if (!grid) return;
    grid.innerHTML = batches.map(b => {
        const name = b.name.trim();
        const imageUrl = batchImageMap[name];
        const logoHtml = imageUrl 
            ? `<img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(name)}" class="w-full h-auto max-h-28 object-contain rounded-xl mb-1">`
            : `<div class="text-5xl mb-1">⚽</div>`;
        return `
            <button onclick='select(${JSON.stringify(name)})' class="batch-tile">
                ${logoHtml}
                <div class="batch-name">${escapeHtml(name)}</div>
                <p class="text-[9px] font-bold mt-0.5" style="color: var(--primary);">${b.count} active</p>
            </button>
        `;
    }).join('');
}

function renderList(containerId, people, type, label, accentColor) {
    const container = document.getElementById(containerId);
    if (!container) return;
    if (!people.length) {
        container.innerHTML = `<div class="text-center py-6 text-xs font-medium" style="color: var(--text-muted);">No ${label.toLowerCase()} found</div>`;
        return;
    }
    let html = `
        <div class="section-header">
            <div class="flex items-center gap-2">
                <div class="w-1 h-4 rounded-full" style="background: ${accentColor}"></div>
                <span class="section-title" style="color: ${accentColor}">${label}</span>
            </div>
            <div class="section-actions">
                <button class="btn-all-present" onclick="setAllPresent('${type}', true)">All Present</button>
                <button class="btn-all-absent" onclick="setAllPresent('${type}', false)">All Absent</button>
                <span class="ml-1 text-[9px] font-bold opacity-40">${people.length}</span>
            </div>
        </div>`;
    html += people.map(p => {
        const isPresent = p.status === 'Present';
        const presentClass = isPresent ? 'present-card' : '';
        return `
            <div class="attendance-card ${presentClass}" data-name="${escapeAttr(p.name.toLowerCase())}">
                <div>
                    <div class="player-name">${escapeHtml(p.name)}</div>
                    <div class="player-id">${p.studentId || 'STAFF'}</div>
                </div>
                <label class="switch">
                    <input type="checkbox" name="attendance_${type}" value="${escapeAttr(p.name)}" data-sid="${p.studentId || ''}" ${isPresent ? 'checked' : ''} onchange="updateCardBorder(this); vibrate();">
                    <div class="slider"></div>
                </label>
            </div>
        `;
    }).join('');
    container.innerHTML = html;
    document.querySelectorAll(`#${containerId} input`).forEach(cb => updateCardBorder(cb));
}

function updateCardBorder(cb) {
    const card = cb.closest('.attendance-card');
    if (!card) return;
    if (cb.checked) card.classList.add('present-card');
    else card.classList.remove('present-card');
}

function setAllPresent(type, present) {
    document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(cb => {
        const card = cb.closest('.attendance-card');
        if (card && card.style.display !== 'none') {
            cb.checked = present;
            updateCardBorder(cb);
        }
    });
    updateStats();
}

function updateStats() {
    const presentStudents = document.querySelectorAll('input[name="attendance_student"]:checked').length;
    const totalStudents = document.querySelectorAll('input[name="attendance_student"]').length;
    const presentCoaches = document.querySelectorAll('input[name="attendance_coach"]:checked').length;
    const totalCoaches = document.querySelectorAll('input[name="attendance_coach"]').length;
    document.getElementById('statPresent').innerText = presentStudents;
    document.getElementById('statTotal').innerText = totalStudents;
    document.getElementById('coachPresent').innerText = presentCoaches;
    document.getElementById('coachTotal').innerText = totalCoaches;
}

function applyRosterSearch() {
    const query = document.getElementById('rosterSearch').value.toLowerCase();
    document.querySelectorAll('#commandView .attendance-card').forEach(card => {
        card.style.display = card.dataset.name.includes(query) ? 'flex' : 'none';
    });
    updateStats();
}

async function markGlobalHoliday() { 
    const date = new Date().toISOString().slice(0,10);
    await markHolidayCore(date, true);
}
async function markHoliday() { 
    const date = document.getElementById('attendanceDate').value;
    if (!date) return showToast('Select a date first', 'error');
    await markHolidayCore(date, false);
}
async function markHolidayCore(date, isGlobal) {
    try {
        const payload = { action: 'markHoliday', date: date, global: isGlobal };
        const formData = new URLSearchParams();
        formData.append('payload', JSON.stringify(payload));
        await fetch(WEB_APP_URL, { method: 'POST', body: formData });
        showToast(`Holiday set for ${date}`, 'success');
        if (!isGlobal) fetchRoster();
        else goHome();
    } catch (err) {
        showToast('Failed to mark holiday', 'error');
    }
}

function shareSessionSummary() {
    const batchName = document.getElementById('Select').value;
    const date = document.getElementById('attendanceDate').value;
    if (!batchName) {
        showToast('Select a batch first', 'error');
        return;
    }
    if (!whatsappNumber || whatsappNumber === '') {
        showToast('Please set WhatsApp number first', 'error');
        return;
    }
    const athletes = [];
    const coaches = [];
    document.querySelectorAll('input[name="attendance_student"]').forEach(input => {
        athletes.push({ name: input.value, isPresent: input.checked });
    });
    document.querySelectorAll('input[name="attendance_coach"]').forEach(input => {
        coaches.push({ name: input.value, isPresent: input.checked });
    });
    const presentAthletes = athletes.filter(a => a.isPresent).map(a => a.name);
    const absentAthletes = athletes.filter(a => !a.isPresent).map(a => a.name);
    const presentCoaches = coaches.filter(c => c.isPresent).map(c => c.name);
    const ballsTaken = document.getElementById('ballsTaken').value;
    const ballsLeft = document.getElementById('ballsLeft').value;
    const formattedDate = new Date(date).toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    let summary = `🏆 *Coffeeland FC Attendance Report*%0A`;
    summary += `📅 *Date:* ${formattedDate}%0A`;
    summary += `⚽ *Batch:* ${batchName}%0A`;
    summary += `━━━━━━━━━━━━━━━━━━━━%0A`;
    summary += `👥 *ATHLETES*%0A`;
    summary += `✅ Present (${presentAthletes.length}/${athletes.length}): ${presentAthletes.length ? presentAthletes.join(', ') : 'None'}%0A`;
    if (absentAthletes.length) summary += `❌ Absent: ${absentAthletes.join(', ')}%0A`;
    summary += `%0A👨‍🏫 *COACHES PRESENT*%0A`;
    summary += `${presentCoaches.length ? presentCoaches.join(', ') : 'None'}%0A`;
    summary += `━━━━━━━━━━━━━━━━━━━━%0A`;
    summary += `⚽ *Ball Inventory*: ${ballsTaken} taken / ${ballsLeft} returned%0A`;
    summary += `📊 *Attendance Rate:* ${Math.round((presentAthletes.length / athletes.length) * 100)}%%%0A`;
    summary += `%0A🔗 *Coffeeland FC Manager*`;
    let number = whatsappNumber.replace(/[\s\-]/g, '');
    if (!number.startsWith('+')) number = '+' + number;
    window.open(`https://wa.me/${number}?text=${summary}`, '_blank');
    showToast('Opening WhatsApp...', 'success');
}

async function loadDailyLogs() {
    const date = document.getElementById('editDate').value;
    const batch = document.getElementById('editBatchSelect').value;
    if (!date) return;
    setLoading('studentLogContainer', true);
    setLoading('coachLogContainer', true);
    document.getElementById('editSaveBtn').classList.add('hidden');
    try {
        const data = await fetchJson(`${WEB_APP_URL}?action=getLogs&date=${date}&batchName=${encodeURIComponent(batch)}`);
        if (data.students.length === 0 && data.coaches.length === 0) {
            document.getElementById('studentLogContainer').innerHTML = '<div class="text-center py-10 text-xs opacity-50">No logs for this date</div>';
            document.getElementById('coachLogContainer').innerHTML = '';
            return;
        }
        renderList('coachLogContainer', data.coaches, 'edit_coach', 'Coach Logs', 'var(--danger)');
        renderList('studentLogContainer', data.students, 'edit_student', 'Athlete Logs', 'var(--primary)');
        document.getElementById('editSaveBtn').classList.remove('hidden');
    } catch (err) {
        showToast('Failed to load logs', 'error');
    }
}

async function submitEditChanges() {
    const btn = document.getElementById('editSaveBtn');
    btn.disabled = true;
    btn.innerText = "Updating...";
    const records = [];
    for (const type of ['edit_coach', 'edit_student']) {
        const realType = type.split('_')[1];
        document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(input => {
            records.push({
                personType: realType,
                studentId: input.dataset.sid || '',
                date: document.getElementById('editDate').value,
                batchName: document.getElementById('editBatchSelect').value || 'Manual Edit',
                personName: input.value,
                status: input.checked ? 'Present' : 'Absent',
                isEdit: true
            });
        });
    }
    try {
        const formData = new URLSearchParams();
        formData.append('payload', JSON.stringify({ action: 'saveAttendance', data: records }));
        await fetch(WEB_APP_URL, { method: 'POST', body: formData });
        showToast('Logs updated', 'success');
        await loadDailyLogs();
    } catch (err) {
        showToast('Update failed', 'error');
    } finally {
        btn.disabled = false;
        btn.innerText = "Update Records";
    }
}

function applyEditLogSearch() {
    const q = document.getElementById('editLogSearch').value.toLowerCase();
    document.querySelectorAll('#editView .attendance-card').forEach(card => {
        card.style.display = card.dataset.name.includes(q) ? 'flex' : 'none';
    });
}

function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
function escapeAttr(str) { return escapeHtml(str); }

document.getElementById('attendanceDate').valueAsDate = new Date();
window.addEventListener('DOMContentLoaded', loades);
</script>
