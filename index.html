<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC | Attendance Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f7fb; --surface: rgba(255,255,255,0.88); --surface-strong: #ffffff;
            --text: #111827; --muted: #6b7280; --border: rgba(17,24,39,0.08);
            --shadow: 0 12px 30px -16px rgba(17,24,39,0.28);
            --emerald-soft: rgba(16,185,129,0.10); --blue-soft: rgba(59,130,246,0.10);
            --rose-soft: rgba(244,63,94,0.10); --loader-bg: #f6f7fb; --loader-text: #111827;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #050505; --surface: rgba(24,24,27,0.86); --surface-strong: #111111;
                --text: #e5e7eb; --muted: #9ca3af; --border: rgba(255,255,255,0.08);
                --shadow: 0 18px 40px -18px rgba(0,0,0,0.65);
                --emerald-soft: rgba(16,185,129,0.14); --blue-soft: rgba(59,130,246,0.14);
                --rose-soft: rgba(244,63,94,0.14); --loader-bg: #050505; --loader-text: #ffffff;
            }
        }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
        .main-fader { width: 100%; height: 100vh; position: fixed; top: 0; left: 0; background-color: var(--loader-bg); z-index: 10000; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        .main-fader.hidden { opacity: 0; visibility: hidden; }
        .loader svg { height: 120px; display: block; margin: 0 auto; }
        .loader svg path { animation: pulse-svg 1.2s infinite ease-in-out; transform-origin: center; fill: #10b981; }
        @keyframes pulse-svg { 0%, 100% { opacity: 0.1; transform: scale(0.96); } 50% { opacity: 1; transform: scale(1); } }
        .hidden-view { display: none !important; }
        .glass { background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); backdrop-filter: blur(14px); }
        .panel { background: var(--surface-strong); border: 1px solid var(--border); box-shadow: var(--shadow); }
        .field { background: var(--surface-strong); border: 1px solid var(--border); color: var(--text); }
        .switch input { display: none; }
        .slider { width: 46px; height: 24px; background-color: rgba(244, 63, 94, 0.16); border-radius: 999px; position: relative; transition: .24s; }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #f43f5e; border-radius: 50%; transition: .24s; }
        input:checked + .slider { background-color: rgba(16, 185, 129, 0.20); }
        input:checked + .slider:before { transform: translateX(22px); background-color: #10b981; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div class="main-fader">
      <div class="loader text-center">
        <svg viewBox="0 0 164.83 151.5" xmlns="http://www.w3.org/2000/svg">
            <path d="M117.24,69.24A8,8,0,0,0,115.67,67c-4.88-4-9.8-7.89-14.86-11.62A4.93,4.93,0,0,0,96.93,55c-5.76,1.89-11.4,4.17-17.18,6a4.36,4.36,0,0,0-3.42,4.12c-1,6.89-2.1,13.76-3,20.66a4,4,0,0,0,1,3.07c5.12,4.36,10.39,8.61,15.68,12.76a3.62,3.62,0,0,0,2.92.75c6.29-2.66,12.52-5.47,18.71-8.36a3.49,3.49,0,0,0,1.68-2.19c1.34-7.25,2.54-14.55,3.9-22.58Z" />
        </svg>
        <h2 class="text-2xl font-black uppercase mt-6 tracking-tighter">Coffeeland <span class="text-emerald-500">FC</span></h2>
      </div>
    </div>

    <header class="sticky top-0 z-40 border-b border-black/5 backdrop-blur-xl" style="background: color-mix(in srgb, var(--bg) 82%, transparent);">
        <div class="px-6 py-5 flex items-center justify-between">
            <button onclick="goHome()" class="text-left">
                <div class="text-xl font-extrabold uppercase tracking-tight">CFC <span class="text-emerald-500">Manager</span></div>
            </button>
            <button onclick="showEditView()" class="glass text-blue-500 text-[10px] font-bold px-4 py-3 rounded-2xl uppercase">📝 Edit Logs</button>
        </div>
    </header>

    <main class="px-6 py-6 space-y-6">
        <section id="lobbyView" class="space-y-5">
            <div class="glass rounded-3xl p-5 space-y-4">
                <select id="homeSelect" onchange="select(this.value)" class="field w-full p-4 text-xs font-bold rounded-2xl outline-none">
                    <option value="">Quick Select ...</option>
                </select>
                <button onclick="markGlobalHoliday()" class="w-full rounded-2xl py-4 text-[10px] uppercase font-black border border-rose-500/20 text-rose-500" style="background: var(--rose-soft);">🌴 Global Holiday (Today)</button>
            </div>
            <div id="Grid" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="commandView" class="hidden-view space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <div class="glass rounded-3xl p-5 border-l-4 border-l-emerald-500">
                    <div class="text-[10px] font-black uppercase muted mb-2">Athletes</div>
                    <div class="text-3xl font-extrabold"><span id="statPresent">0</span><span class="text-sm muted"> / <span id="statTotal">0</span></span></div>
                </div>
                <div class="glass rounded-3xl p-5 border-l-4 border-l-blue-500">
                    <div class="text-[10px] font-black uppercase muted mb-2">Coaches</div>
                    <div class="text-3xl font-extrabold"><span id="coachPresent">0</span><span class="text-sm muted"> / <span id="coachTotal">0</span></span></div>
                </div>
            </div>

            <div class="glass rounded-3xl p-5 border-l-4 border-l-orange-400">
                <div class="text-[10px] font-black uppercase muted mb-3">Equipment Inventory</div>
                <div class="flex items-center justify-between gap-4">
                    <div class="flex-1">
                        <p class="text-[9px] font-bold uppercase opacity-50 mb-1">Taken (Start)</p>
                        <div class="flex items-center gap-2">
                            <button onclick="adjustInventory('ballsTaken', -1)" class="w-7 h-7 rounded-full bg-black/5 dark:bg-white/5 flex items-center justify-center font-bold text-xs">-</button>
                            <input type="number" id="ballsTaken" value="0" class="w-8 text-center bg-transparent font-black text-sm outline-none">
                            <button onclick="adjustInventory('ballsTaken', 1)" class="w-7 h-7 rounded-full bg-black/5 dark:bg-white/5 flex items-center justify-center font-bold text-xs">+</button>
                        </div>
                    </div>
                    <div class="w-[1px] h-8 bg-black/5 dark:bg-white/10"></div>
                    <div class="flex-1 text-right">
                        <p class="text-[9px] font-bold uppercase opacity-50 mb-1">Left (End)</p>
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="adjustInventory('ballsLeft', -1)" class="w-7 h-7 rounded-full bg-black/5 dark:bg-white/5 flex items-center justify-center font-bold text-xs">-</button>
                            <input type="number" id="ballsLeft" value="0" class="w-8 text-center bg-transparent font-black text-sm outline-none">
                            <button onclick="adjustInventory('ballsLeft', 1)" class="w-7 h-7 rounded-full bg-black/5 dark:bg-white/5 flex items-center justify-center font-bold text-xs">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="markHoliday()" class="w-full glass rounded-2xl py-4 text-[10px] uppercase font-black text-rose-500">🌴 Mark as Holiday <span id="holidayBtnDate"></span></button>

            <div class="flex gap-3">
                <select id="Select" onchange="fetchRoster()" class="field p-4 text-xs font-bold rounded-2xl flex-1 outline-none"></select>
                <input type="date" id="attendanceDate" onchange="fetchRoster()" class="field p-4 text-xs font-bold rounded-2xl w-[38%] outline-none">
            </div>

            <input type="text" id="rosterSearch" oninput="applyRosterSearch()" placeholder="Search..." class="field w-full p-4 text-xs font-bold rounded-2xl outline-none">

            <div id="coachesList" class="space-y-2"></div>
            <div id="studentsList" class="space-y-2"></div>

            <button onclick="submitAttendance()" id="submitBtn" class="w-full bg-emerald-500 text-white font-extrabold py-5 rounded-3xl uppercase text-sm shadow-xl">Commit Records</button>
        </section>

        <section id="editView" class="hidden-view space-y-5">
            <div class="flex justify-between items-center"><h2 class="text-xs font-black uppercase muted">Log Editor</h2><button onclick="goHome()" class="text-xs font-bold text-emerald-500">Close</button></div>
            
            <div class="flex gap-3">
                <input type="date" id="editDate" onchange="loadDailyLogs()" class="field p-4 text-xs font-bold rounded-2xl flex-1 outline-none">
                <select id="editBatchSelect" onchange="loadDailyLogs()" class="field p-4 text-xs font-bold rounded-2xl w-1/2 outline-none">
                    <option value="">All Batches</option>
                </select>
            </div>

            <input type="text" id="editLogSearch" oninput="applyEditLogSearch()" placeholder="Search in logs..." class="field w-full p-4 text-xs font-bold rounded-2xl outline-none">
            
            <div id="studentLogContainer" class="space-y-2"></div>
            <div id="coachLogContainer" class="space-y-2"></div>

            <button onclick="submitEditChanges()" id="editSaveBtn" class="hidden-view w-full bg-blue-500 text-white font-extrabold py-5 rounded-3xl uppercase text-sm shadow-xl">Update Records</button>
            <div class="pb-20"></div>
        </section>
    </main>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOE5N7bji1t3ck7VA1GU-pDZNE0RXY6k1RIWcRibi1npvNHaBRP188Cn5yc6sEy0NZ/exec";

// Global Cache for speed
let cachedBatches = null;

function hideLoader() { document.querySelector('.main-fader').classList.add('hidden'); }
function goHome() { 
    document.getElementById('lobbyView').classList.remove('hidden-view'); 
    document.getElementById('commandView').classList.add('hidden-view'); 
    document.getElementById('editView').classList.add('hidden-view'); 
}

function showEditView() { 
    document.getElementById('lobbyView').classList.add('hidden-view'); 
    document.getElementById('commandView').classList.add('hidden-view'); 
    document.getElementById('editView').classList.remove('hidden-view'); 
    document.getElementById('editDate').valueAsDate = new Date(); 
    loadDailyLogs(); 
}

function select(n) { 
    if(!n) return; 
    document.getElementById('Select').value = n; 
    fetchRoster(); 
}

document.getElementById('attendanceDate').valueAsDate = new Date();
window.onload = loades;

function adjustInventory(id, amount) {
    const el = document.getElementById(id);
    let val = parseInt(el.value) || 0;
    el.value = Math.max(0, val + amount);
}

// Fast fetch helper
async function fetchJson(url, options = {}) {
    const res = await fetch(url, options);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
}

async function loades() {
    // If we have cached batches, render them instantly
    if (cachedBatches) {
        renderGrid(cachedBatches);
        hideLoader();
        return;
    }

    try {
        const data = await fetchJson(`${WEB_APP_URL}?action=getes`);
        cachedBatches = data.batches;
        renderGrid(data.batches);
        
        // Populate dropdowns
        const homeSelect = document.getElementById('homeSelect');
        const batchSelect = document.getElementById('Select');
        const editBatchSelect = document.getElementById('editBatchSelect');
        
        data.batches.forEach(b => {
            const opt = `<option value="${escapeAttr(b.name.trim())}">${escapeHtml(b.name.trim())}</option>`;
            homeSelect.innerHTML += opt;
            batchSelect.innerHTML += opt;
            editBatchSelect.innerHTML += opt;
        });

        setTimeout(hideLoader, 200); // Snappier exit
    } catch (err) { 
        console.error("Boot Error:", err);
        hideLoader(); 
    }
}

function renderGrid(batches) {
    const grid = document.getElementById('Grid');
    grid.innerHTML = batches.map(b => {
        const name = b.name.trim();
        return `<button onclick='select(${JSON.stringify(name)})' class="glass p-6 rounded-[2rem] flex flex-col justify-between aspect-square text-left active:scale-95 transition-transform">
            <div class="text-xl">⚽</div>
            <div>
                <h3 class="text-sm font-extrabold leading-tight">${escapeHtml(name)}</h3>
                <p class="text-[10px] text-emerald-500 font-bold mt-1">${b.count} Active</p>
            </div>
        </button>`;
    }).join('');
}

async function fetchRoster() {
    const batchName = document.getElementById('Select').value;
    const date = document.getElementById('attendanceDate').value;
    if (!batchName) return;

    // UI transitions
    document.getElementById('lobbyView').classList.add('hidden-view');
    document.getElementById('commandView').classList.remove('hidden-view');
    document.getElementById('holidayBtnDate').innerText = `(${new Date(date).toLocaleDateString('en-GB', {day:'numeric', month:'short'})})`;

    // Immediate visual reset
    const coachList = document.getElementById('coachesList');
    const studentList = document.getElementById('studentsList');
    coachList.innerHTML = `<div class="p-10 text-center animate-pulse text-[10px] font-black uppercase opacity-30">Loading Session...</div>`;
    studentList.innerHTML = "";

    try {
        const data = await fetchJson(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}&date=${encodeURIComponent(date)}`);
        
        renderList('coachesList', data.coaches, 'coach', 'Coaches', 'blue');
        renderList('studentsList', data.students, 'student', 'Athletes', 'emerald');
        
        // Handle Inventory Session-Awareness
        const takenEl = document.getElementById('ballsTaken');
        const leftEl = document.getElementById('ballsLeft');
        if (data.inventory) {
            takenEl.value = data.inventory.taken || 0;
            leftEl.value = data.inventory.left || 0;
        } else {
            takenEl.value = 0;
            leftEl.value = 0;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = data.isLogged ? "Update Session Log" : "Commit Records";
        btn.className = `w-full ${data.isLogged ? 'bg-blue-600' : 'bg-emerald-500'} text-white font-extrabold py-5 rounded-3xl uppercase text-sm shadow-xl transition-colors`;

        updateStats();
    } catch (err) { 
        coachList.innerHTML = `<div class="p-10 text-center text-rose-500 text-[10px] font-bold">FAILED TO LOAD ROSTER</div>`;
    }
}

// Logic optimized for large lists (40+ rows)
function renderList(containerId, people, type, label, color) {
    const container = document.getElementById(containerId);
    let html = `
        <div class="flex items-center justify-between mb-3 ${type.includes('student') ? 'mt-8' : 'mt-2'} px-2">
            <div class="flex items-center gap-2">
                <div class="w-1 h-4 bg-${color}-500 rounded-full"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-${color}-500">${label}</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleSection('${type}', true)" class="text-[9px] font-black uppercase text-${color}-500">All</button>
                <div class="w-[1px] h-2 bg-black/10 dark:bg-white/10"></div>
                <button onclick="toggleSection('${type}', false)" class="text-[9px] font-black uppercase muted">Clear</button>
                <span class="ml-2 text-[9px] font-bold opacity-30">${people.length} Total</span>
            </div>
        </div>`;

    html += people.map(p => `
        <div class="attendance-card panel rounded-2xl p-4 mb-2 flex justify-between items-center border-l-4 border-l-${color}-500/30" data-name="${escapeAttr(p.name.toLowerCase())}">
            <div class="min-w-0 flex-1">
                <p class="font-bold text-sm text-current truncate">${escapeHtml(p.name)}</p>
                <p class="text-[8px] font-black uppercase opacity-40 tracking-tighter">${p.studentId || 'STAFF'}</p>
            </div>
            <label class="switch">
                <input type="checkbox" name="attendance_${type}" value="${escapeAttr(p.name)}" data-sid="${p.studentId || ''}" ${p.status === 'Present' ? 'checked' : ''} onchange="updateStats()">
                <div class="slider"></div>
            </label>
        </div>`).join('');
    container.innerHTML = html;
}

function toggleSection(type, state) {
    const checkboxes = document.querySelectorAll(`input[name="attendance_${type}"]`);
    checkboxes.forEach(cb => { 
        if (cb.closest('.attendance-card').style.display !== 'none') cb.checked = state; 
    });
    updateStats();
}

function updateStats() {
    const getCount = (name) => Array.from(document.querySelectorAll(`input[name="${name}"]`)).filter(i => i.checked && i.closest('.attendance-card').style.display !== 'none').length;
    const getTotal = (name) => Array.from(document.querySelectorAll(`input[name="${name}"]`)).filter(i => i.closest('.attendance-card').style.display !== 'none').length;
    
    const sp = document.getElementById('statPresent');
    const st = document.getElementById('statTotal');
    const cp = document.getElementById('coachPresent');
    const ct = document.getElementById('coachTotal');

    if(sp) sp.innerText = getCount('attendance_student');
    if(st) st.innerText = getTotal('attendance_student');
    if(cp) cp.innerText = getCount('attendance_coach');
    if(ct) ct.innerText = getTotal('attendance_coach');
}

function applyRosterSearch() {
    const q = document.getElementById('rosterSearch').value.toLowerCase();
    document.querySelectorAll('#commandView .attendance-card').forEach(card => {
        card.style.display = card.dataset.name.includes(q) ? '' : 'none';
    });
    updateStats();
}

async function loadDailyLogs() {
    const date = document.getElementById('editDate').value;
    const batch = document.getElementById('editBatchSelect').value;
    if (!date) return;

    const sContainer = document.getElementById('studentLogContainer');
    sContainer.innerHTML = '<p class="text-center py-10 text-[10px] font-bold animate-pulse">SEARCHING HISTORY...</p>';
    document.getElementById('coachLogContainer').innerHTML = '';
    document.getElementById('editSaveBtn').classList.add('hidden-view');

    try {
        const data = await fetchJson(`${WEB_APP_URL}?action=getLogs&date=${date}&batchName=${encodeURIComponent(batch)}`);
        if (data.students.length === 0 && data.coaches.length === 0) {
            sContainer.innerHTML = '<p class="text-center py-10 text-[10px] font-bold opacity-40 uppercase">No records found</p>';
            return;
        }
        renderList('coachLogContainer', data.coaches, 'edit_coach', 'Coach Logs', 'blue');
        renderList('studentLogContainer', data.students, 'edit_student', 'Athlete Logs', 'emerald');
        document.getElementById('editSaveBtn').classList.remove('hidden-view');
    } catch (err) { 
        sContainer.innerHTML = '<p class="text-center py-10 text-rose-500 text-[10px] font-bold">ERROR LOADING LOGS</p>'; 
    }
}

async function submitEditChanges() {
    const btn = document.getElementById('editSaveBtn');
    btn.disabled = true; 
    btn.innerText = "UPDATING...";
    
    const records = [];
    ['edit_coach', 'edit_student'].forEach(type => {
        const realType = type.split('_')[1];
        document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(input => {
            records.push({ 
                personType: realType, 
                studentId: input.dataset.sid || '', 
                date: document.getElementById('editDate').value, 
                batchName: document.getElementById('editBatchSelect').value || 'Manual Edit', 
                personName: input.value, 
                status: input.checked ? 'Present' : 'Absent', 
                isEdit: true 
            });
        });
    });

    try {
        const formData = new URLSearchParams();
        formData.append('payload', JSON.stringify({ action: 'saveAttendance', data: records }));
        await fetch(WEB_APP_URL, { method: 'POST', body: formData });
        btn.innerText = "✅ UPDATED";
        setTimeout(loadDailyLogs, 500);
    } catch (err) { 
        alert("Update failed."); 
        btn.disabled = false;
        btn.innerText = "Update Records";
    }
}

function applyEditLogSearch() {
    const q = document.getElementById('editLogSearch').value.toLowerCase();
    document.querySelectorAll('#editView .attendance-card').forEach(card => {
        card.style.display = card.dataset.name.includes(q) ? '' : 'none';
    });
}

// OPTIMIZED: The "Optimistic Sync"
async function submitAttendance() {
    const btn = document.getElementById('submitBtn');
    const batchName = document.getElementById('Select').value;
    const date = document.getElementById('attendanceDate').value;
    if (!batchName) return alert("Select batch");
    
    btn.disabled = true; 
    btn.innerText = "SYNCING...";
    
    const taken = document.getElementById('ballsTaken').value;
    const left = document.getElementById('ballsLeft').value;
    
    const records = [];
    ['coach', 'student'].forEach(type => {
        document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(input => {
            records.push({ 
                personType: type, 
                studentId: input.dataset.sid || '', 
                date, 
                batchName, 
                personName: input.value, 
                status: input.checked ? 'Present' : 'Absent',
                ballsTaken: taken,
                ballsLeft: left
            });
        });
    });
    
    try {
        const formData = new URLSearchParams();
        formData.append('payload', JSON.stringify({ action: 'saveAttendance', data: records }));
        
        // Fire and forget (Optimistic UI)
        fetch(WEB_APP_URL, { method: 'POST', body: formData });
        
        btn.innerText = "✅ DONE!"; 
        btn.style.backgroundColor = "#10B981";
        
        setTimeout(() => { 
            // Silent reset instead of hard reload for speed
            goHome();
            btn.disabled = false;
            btn.innerText = "Commit Records";
            btn.style.backgroundColor = "";
            alert("Attendance Synced in Background");
        }, 400);
    } catch (err) { 
        alert("❌ Sync Error"); 
        btn.disabled = false; 
        btn.innerText = "Commit Records"; 
    }
}

function escapeHtml(v) { return String(v || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function escapeAttr(v) { return escapeHtml(v); }
</script>
</body>
</html>
