<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC | Pro Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        pitch: '#050505',
                        espresso: '#0F0A08',
                        bean: '#1A1412',
                        mint: '#10B981',
                        rose: '#F43F5E'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #E5E7EB; -webkit-font-smoothing: antialiased; }
        .neo-blur { background: rgba(15, 10, 8, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .card-gradient { background: linear-gradient(165deg, #1A1412 0%, #0F0A08 100%); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Logic-Based Switches: Red when off, Mint when on */
        .switch input { display: none; }
        .slider { 
            width: 46px; height: 24px; 
            background-color: rgba(244, 63, 94, 0.2); 
            border: 1px solid rgba(244, 63, 94, 0.4);
            border-radius: 20px; position: relative; transition: .3s; 
        }
        .slider:before { 
            content: ""; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px; 
            background-color: #F43F5E; 
            border-radius: 50%; transition: .3s; 
        }
        input:checked + .slider { 
            background-color: rgba(16, 185, 129, 0.2); 
            border-color: rgba(16, 185, 129, 0.4);
        }
        input:checked + .slider:before { 
            transform: translateX(22px); 
            background-color: #10B981; 
        }

        .cmd-btn {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-40">

    <header class="pt-8 px-6 text-center space-y-4">
        <img src="https://i.ibb.co/3nTMhbz/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" alt="CFC Logo" class="h-16 mx-auto drop-shadow-2xl">
        <h1 class="text-xs font-800 tracking-[0.2em] text-white uppercase opacity-60">Attendance Management</h1>
    </header>

    <nav class="px-6 mt-6 space-y-3">
        <select id="batchSelect" class="w-full bg-bean border border-white/10 rounded-xl py-4 px-4 text-sm font-bold text-white outline-none">
            <option value="">Syncing Batches...</option>
        </select>
        <button onclick="fetchRoster()" id="loadBtn" class="w-full bg-white text-pitch font-900 py-4 rounded-xl active:scale-95 transition-all shadow-xl">
            LOAD BATCH
        </button>
    </nav>

    <main id="rosterPanel" class="hidden px-6 mt-8 space-y-8">
        
        <div class="grid grid-cols-2 gap-3">
            <div class="card-gradient rounded-2xl p-4 border-l-4 border-l-mint">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">Athletes Present</p>
                <div class="flex items-baseline gap-1">
                    <span id="statPresent" class="text-3xl font-900 text-white">0</span>
                    <span class="text-gray-500 text-sm font-bold">/ <span id="statTotal">0</span></span>
                </div>
            </div>
            <div class="card-gradient rounded-2xl p-4 border-l-4 border-l-blue-500">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">Coaches Active</p>
                <div class="flex items-baseline gap-1">
                    <span id="coachPresent" class="text-3xl font-900 text-white">0</span>
                    <span class="text-gray-500 text-sm font-bold">/ <span id="coachTotal">0</span></span>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center border-b border-white/5 pb-3">
            <h2 class="text-[11px] font-900 text-white/80 uppercase tracking-widest">Live Roster</h2>
            <input type="date" id="attendanceDate" class="bg-bean px-3 py-1 rounded-lg text-mint font-bold text-[11px] outline-none border border-white/5">
        </div>

        <section class="space-y-4">
            <div class="flex justify-between items-center bg-blue-500/5 p-2 rounded-xl border border-blue-500/10">
                <h3 class="text-[11px] font-900 text-blue-400 uppercase ml-2">Instructors</h3>
                <div class="flex gap-2">
                    <button onclick="toggleAll('attendance_coach', true)" class="cmd-btn bg-blue-500/20 text-blue-400">All</button>
                    <button onclick="toggleAll('attendance_coach', false)" class="cmd-btn bg-rose/10 text-rose">Clear</button>
                </div>
            </div>
            <div id="coachesList" class="space-y-2"></div>
        </section>

        <section class="space-y-4">
            <div class="flex justify-between items-center bg-mint/5 p-2 rounded-xl border border-mint/10">
                <h3 class="text-[11px] font-900 text-mint uppercase ml-2">Athletes</h3>
                <div class="flex gap-2">
                    <button onclick="toggleAll('attendance_student', true)" class="cmd-btn bg-mint/20 text-mint">Present</button>
                    <button onclick="toggleAll('attendance_student', false)" class="cmd-btn bg-rose/10 text-rose">Absent</button>
                </div>
            </div>
            <div id="studentsList" class="space-y-2"></div>
        </section>

        <section id="lastSessionContainer" class="hidden space-y-4 pt-6 border-t border-white/10">
            <div class="flex items-center justify-between">
                <h3 class="text-[11px] font-900 text-white/40 uppercase tracking-[0.2em]">Previous Session Detail</h3>
                <span id="lastSessionDate" class="text-[10px] font-bold text-mint bg-mint/10 px-2 py-1 rounded-md">-- ---</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-2">
                    <span class="text-[9px] font-bold uppercase text-mint opacity-60">Presentees</span>
                    <div id="lastPresentList" class="card-gradient rounded-xl p-3 min-h-[80px] text-[10px] space-y-1 text-gray-400"></div>
                </div>
                <div class="space-y-2">
                    <span class="text-[9px] font-bold uppercase text-rose opacity-60">Absentees</span>
                    <div id="lastAbsentList" class="card-gradient rounded-xl p-3 min-h-[80px] text-[10px] space-y-1 text-gray-400 border-l-rose/20"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="actionContainer" class="hidden fixed bottom-0 left-0 right-0 p-6 neo-blur border-t border-white/10">
        <button onclick="submitAttendance()" id="submitBtn" class="w-full bg-mint text-pitch font-900 py-5 rounded-2xl shadow-2xl shadow-mint/20 active:scale-95 transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-3">
            Commit Records
        </button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNIWDyIX6Lr2Bm8z1PpGqtInz2240zaCAZlTqz6omhwFSF5yWx3Sl1HvYYOoOnzMCk/exec";
        document.getElementById('attendanceDate').valueAsDate = new Date();

       window.onload = async () => {
    const select = document.getElementById('batchSelect');
    try {
        const response = await fetch(`${WEB_APP_URL}?action=getBatches`, { method: 'GET', redirect: 'follow' });
        const data = await response.json();
        select.innerHTML = '<option value="">Select Target Batch</option>';
        // FIXED: Using b.name as the value because the script filters by name
        data.batches?.forEach(b => select.innerHTML += `<option value="${b.name}">${b.name}</option>`);
    } catch (err) { select.innerHTML = '<option value="">Network Error</option>'; }
};
        async function fetchRoster() {
            const batchName = document.getElementById('batchSelect').value;
            if (!batchName) return;
            const btn = document.getElementById('loadBtn');
            btn.disabled = true; btn.innerText = "SYNCING...";
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}`, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                renderList('coachesList', data.coaches, 'coach');
                renderList('studentsList', data.students, 'student');
                fetchHistory(batchName);
                document.getElementById('rosterPanel').classList.remove('hidden');
                document.getElementById('actionContainer').classList.remove('hidden');
                updateStats();
            } catch (err) { alert("Data fetch failed"); } 
            finally { btn.disabled = false; btn.innerText = "INITIALIZE SESSION"; }
        }

        function renderList(containerId, people, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            people?.forEach((person, index) => {
                const id = `${type}_${index}`;
                const status = person.status || 'Active';
                const statusColor = status.toLowerCase() === 'active' ? 'text-mint' : 'text-white/20';
                container.innerHTML += `
                    <div class="card-gradient rounded-xl p-4 flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-11 h-11 rounded-full bg-bean border border-white/10 flex items-center justify-center font-black text-gray-500 text-lg">${person.name.charAt(0)}</div>
                            <div>
                                <p class="font-bold text-gray-100 text-[15px] leading-tight">${person.name}</p>
                                <p class="text-[9px] font-black uppercase tracking-widest mt-0.5 ${statusColor}">${status}</p>
                            </div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" name="attendance_${type}" id="${id}" value="${person.name}" checked onchange="updateStats()">
                            <div class="slider"></div>
                        </label>
                    </div>`;
            });
        }

        async function fetchHistory(batchName) {
            const pList = document.getElementById('lastPresentList');
            const aList = document.getElementById('lastAbsentList');
            const dateLabel = document.getElementById('lastSessionDate');
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getHistory&batchName=${encodeURIComponent(batchName)}`, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                if (data.history && data.history.length > 0) {
                    const last = data.history[0];
                    dateLabel.innerText = last.date;
                    pList.innerHTML = last.presentNames.length ? last.presentNames.map(n => `<div>• ${n}</div>`).join('') : '--';
                    aList.innerHTML = last.absentNames.length ? last.absentNames.map(n => `<div class="text-rose/80">• ${n}</div>`).join('') : '--';
                    document.getElementById('lastSessionContainer').classList.remove('hidden');
                }
            } catch (e) { console.error("History offline"); }
        }

        function toggleAll(name, state) {
            document.querySelectorAll(`input[name="${name}"]`).forEach(cb => cb.checked = state);
            updateStats();
        }

        function updateStats() {
            document.getElementById('statPresent').innerText = document.querySelectorAll('input[name="attendance_student"]:checked').length;
            document.getElementById('statTotal').innerText = document.querySelectorAll('input[name="attendance_student"]').length;
            document.getElementById('coachPresent').innerText = document.querySelectorAll('input[name="attendance_coach"]:checked').length;
            document.getElementById('coachTotal').innerText = document.querySelectorAll('input[name="attendance_coach"]').length;
        }

        async function submitAttendance() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "UPLOADING...";
            const records = [];
            ['coach', 'student'].forEach(type => {
                document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(input => {
                    records.push({
                        personType: type,
                        date: document.getElementById('attendanceDate').value,
                        batchName: document.getElementById('batchSelect').value,
                        personName: input.value,
                        status: input.checked ? 'Present' : 'Absent'
                    });
                });
            });
            const formData = new URLSearchParams();
            formData.append('payload', JSON.stringify({ action: "saveAttendance", data: records }));
            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', redirect: 'follow', body: formData });
                const res = await response.json();
                if(res.status === 'success') { alert("Synced Successfully."); location.reload(); }
            } catch (err) { alert("Sync failed."); btn.disabled = false; btn.innerText = "COMMIT RECORDS"; }
        }
    </script>
</body>
</html>
