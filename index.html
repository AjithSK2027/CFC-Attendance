<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffeeland FC · Premium Attendance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            background: radial-gradient(circle at 10% 20%, #0B0F1C, #03060C);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .glass-panel {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(18, 25, 40, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            overflow: hidden;
        }
        .premium-header {
            background: linear-gradient(135deg, #0A0F1E 0%, #121A2A 100%);
            padding: 1.5rem 2rem;
            border-bottom: 2px solid #D4AF37;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo-area h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #F9E0A0, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge-club {
            background: rgba(212, 175, 55, 0.15);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #E9C46A;
        }
        .dashboard-content {
            padding: 2rem;
        }
        .config-card, .attendance-card {
            background: rgba(12, 18, 28, 0.8);
            border-radius: 1.5rem;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #F5E7C8;
            border-left: 4px solid #D4AF37;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1.5rem;
        }
        .input-group {
            flex: 1;
            min-width: 180px;
        }
        .input-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #B9C7D9;
            margin-bottom: 0.3rem;
        }
        input, select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #0F1622;
            border: 1px solid #2A3348;
            border-radius: 1rem;
            color: white;
            font-size: 0.9rem;
        }
        button {
            background: linear-gradient(95deg, #D4AF37, #B88F1A);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #0A0F1E;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .btn-secondary {
            background: rgba(30, 40, 60, 0.9);
            color: #E9C46A;
            border: 1px solid #D4AF37;
        }
        .roster-table {
            width: 100%;
            border-collapse: collapse;
        }
        .roster-table th {
            text-align: left;
            padding: 0.8rem 0.5rem;
            color: #B9C1D4;
            border-bottom: 1px solid #2A3348;
        }
        .roster-table td {
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid #1E2638;
            color: #E4E9F2;
        }
        .status-select {
            background: #0F1622;
            border: 1px solid #3A4562;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            color: #FFE6B3;
        }
        .empty-message {
            text-align: center;
            padding: 2rem;
            color: #8E9BB0;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .alert {
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .alert-success {
            background: rgba(46,125,50,0.2);
            border-left: 4px solid #4CAF50;
            color: #C8E6C9;
        }
        .alert-error {
            background: rgba(198,40,40,0.2);
            border-left: 4px solid #F44336;
            color: #FFCDD2;
        }
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #D4AF37;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #5F6F8A;
            border-top: 1px solid rgba(212,175,55,0.2);
        }
    </style>
</head>
<body>
<div class="glass-panel">
    <div class="premium-header">
        <div class="logo-area">
            <h1>☕ Coffeeland FC</h1>
            <p>attendance command center</p>
        </div>
        <div class="badge-club">⚡ PREMIUM TRACKING</div>
    </div>
    <div class="dashboard-content">
        <div class="config-card">
            <div class="section-title">🔌 GOOGLE SHEETS ENGINE</div>
            <div class="flex-row">
                <div class="input-group">
                    <label>📎 APPS SCRIPT WEB APP URL</label>
                    <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
                </div>
                <button id="saveUrlBtn">💾 SAVE & CONNECT</button>
            </div>
            <div id="urlStatus"></div>
        </div>

        <div class="attendance-card">
            <div class="section-title">📋 BATCH SESSION · MARK ATTENDANCE</div>
            <div class="flex-row">
                <div class="input-group">
                    <label>📅 SESSION DATE</label>
                    <input type="date" id="attendanceDate">
                </div>
                <div class="input-group">
                    <label>⚽ SELECT BATCH</label>
                    <select id="batchSelect"><option>-- Load batches --</option></select>
                </div>
                <button id="refreshBatchesBtn" class="btn-secondary">⟳ REFRESH BATCHES</button>
            </div>
            <div id="rosterPanel"><div class="empty-message">✨ Select a batch & refresh</div></div>
            <div class="action-bar">
                <button id="markAllPresentBtn" class="btn-secondary">✅ MARK ALL PRESENT</button>
                <button id="markAllAbsentBtn" class="btn-secondary">❌ MARK ALL ABSENT</button>
                <button id="submitAttendanceBtn">📤 SAVE TO SHEETS</button>
            </div>
            <div id="globalMessage"></div>
        </div>
    </div>
    <footer>☕ Coffeeland FC · Data saved to Google Sheets</footer>
</div>

<script>
    // ---------- CONFIG ----------
    let APP_SCRIPT_URL = localStorage.getItem('coffeeland_script_url') || '';
    const urlInput = document.getElementById('scriptUrlInput');
    const saveUrlBtn = document.getElementById('saveUrlBtn');
    const urlStatusDiv = document.getElementById('urlStatus');
    const batchSelect = document.getElementById('batchSelect');
    const refreshBatchesBtn = document.getElementById('refreshBatchesBtn');
    const attendanceDateInput = document.getElementById('attendanceDate');
    const rosterPanel = document.getElementById('rosterPanel');
    const submitBtn = document.getElementById('submitAttendanceBtn');
    const markAllPresent = document.getElementById('markAllPresentBtn');
    const markAllAbsent = document.getElementById('markAllAbsentBtn');
    const globalMsgDiv = document.getElementById('globalMessage');

    let currentRoster = { students: [], coaches: [] };
    let currentBatchName = '';

    function showMessage(msg, isError = false) {
        globalMsgDiv.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${msg}</div>`;
        setTimeout(() => { if(globalMsgDiv.innerHTML.includes(msg)) globalMsgDiv.innerHTML = ''; }, 4000);
    }

    function setLoader(btn, loading, originalText) {
        if(loading) {
            btn._original = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="loader"></span> loading...`;
        } else {
            btn.disabled = false;
            btn.innerHTML = btn._original || originalText;
        }
    }

    // ----- API calls using pathInfo -----
    async function callScriptGet(path) {
        if(!APP_SCRIPT_URL) throw new Error('No Web App URL configured');
        const url = APP_SCRIPT_URL + '/' + path;
        const resp = await fetch(url);
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        if(json.error) throw new Error(json.error);
        return json;
    }

    async function saveAttendance(records) {
        if(!APP_SCRIPT_URL) throw new Error('No URL');
        const payload = { action: 'saveAttendance', data: records };
        const formBody = new URLSearchParams();
        formBody.append('payload', JSON.stringify(payload));
        const resp = await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formBody
        });
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        if(json.error) throw new Error(json.error);
        return json;
    }

    async function loadBatches() {
        const data = await callScriptGet('getBatches');
        return data.batches || [];
    }

    async function refreshBatchesDropdown() {
        if(!APP_SCRIPT_URL) { showMessage('Save URL first', true); return; }
        batchSelect.innerHTML = '<option>Loading batches...</option>';
        try {
            const batches = await loadBatches();
            if(batches.length === 0) { batchSelect.innerHTML = '<option>No batches found</option>'; return; }
            let html = '<option value="">-- Select Batch --</option>';
            batches.forEach(b => { html += `<option value="${escapeHtml(b.name)}">${escapeHtml(b.name)}</option>`; });
            batchSelect.innerHTML = html;
        } catch(e) { showMessage('Error loading batches: '+e.message, true); batchSelect.innerHTML = '<option>Error</option>'; }
    }

    async function loadRoster(batchName) {
        if(!batchName) { rosterPanel.innerHTML = '<div class="empty-message">Select a batch</div>'; return; }
        rosterPanel.innerHTML = '<div class="empty-message"><span class="loader"></span> Loading roster...</div>';
        try {
            const data = await callScriptGet('getRoster/' + encodeURIComponent(batchName));
            currentRoster = { students: data.students || [], coaches: data.coaches || [] };
            renderRoster();
        } catch(e) { rosterPanel.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
    }

    function renderRoster() {
        const students = currentRoster.students;
        const coaches = currentRoster.coaches;
        if(students.length===0 && coaches.length===0) {
            rosterPanel.innerHTML = '<div class="empty-message">No active students or coaches for this batch.</div>';
            return;
        }
        let html = '';
        if(coaches.length) {
            html += `<div class="subgroup"><h3 style="color:#E9C46A;">🧑‍🏫 COACHES</h3><table class="roster-table"><thead><tr><th>Name</th><th>Status</th></tr></thead><tbody>`;
            coaches.forEach(c => {
                html += `<tr><td>${escapeHtml(c.name)}</td><td><select class="status-select" data-type="coach" data-name="${escapeHtml(c.name)}"><option value="Present">✅ Present</option><option value="Absent">❌ Absent</option></select></td></tr>`;
            });
            html += `</tbody></table></div>`;
        }
        if(students.length) {
            html += `<div class="subgroup"><h3 style="color:#7FDBB0;">👕 STUDENTS</h3><table class="roster-table"><thead><tr><th>Name</th><th>Status</th></tr></thead><tbody>`;
            students.forEach(s => {
                html += `<tr><td>${escapeHtml(s.name)}</td><td><select class="status-select" data-type="student" data-name="${escapeHtml(s.name)}"><option value="Present">✅ Present</option><option value="Absent">❌ Absent</option></select></td></tr>`;
            });
            html += `</tbody></table></div>`;
        }
        rosterPanel.innerHTML = html;
    }

    function collectRecords() {
        const selects = document.querySelectorAll('.status-select');
        if(selects.length===0) { showMessage('No roster items', true); return []; }
        const date = attendanceDateInput.value;
        if(!date) { showMessage('Select date', true); return []; }
        if(!currentBatchName) { showMessage('No batch selected', true); return []; }
        const records = [];
        selects.forEach(sel => {
            const type = sel.getAttribute('data-type');
            const name = sel.getAttribute('data-name');
            const status = sel.value === 'Present' ? 'Present' : 'Absent';
            records.push({ personType: type, personName: name, date: date, batchName: currentBatchName, status: status });
        });
        return records;
    }

    function markAll(status) {
        const selects = document.querySelectorAll('.status-select');
        if(selects.length===0) { showMessage('No roster', true); return; }
        selects.forEach(s => s.value = status);
        showMessage(`All marked ${status}`, false);
    }

    async function submitAttendance() {
        const records = collectRecords();
        if(records.length===0) return;
        if(!confirm(`Save ${records.length} records for ${currentBatchName} on ${attendanceDateInput.value}?`)) return;
        setLoader(submitBtn, true, '📤 SAVE TO SHEETS');
        try {
            const res = await saveAttendance(records);
            if(res.status === 'success') showMessage(`✅ Saved ${res.savedCount} records`, false);
            else throw new Error('Unknown response');
        } catch(e) { showMessage(`❌ ${e.message}`, true); }
        finally { setLoader(submitBtn, false, '📤 SAVE TO SHEETS'); }
    }

    function onBatchChange() {
        currentBatchName = batchSelect.value;
        if(currentBatchName) loadRoster(currentBatchName);
        else rosterPanel.innerHTML = '<div class="empty-message">Select a batch</div>';
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function setDefaultDate() { attendanceDateInput.value = new Date().toISOString().slice(0,10); }

    // Event listeners
    saveUrlBtn.addEventListener('click', () => {
        let newUrl = urlInput.value.trim();
        if(!newUrl) { urlStatusDiv.innerHTML = '<div class="alert alert-error">Enter URL</div>'; return; }
        if(!newUrl.includes('/exec')) { urlStatusDiv.innerHTML = '<div class="alert alert-error">Must end with /exec</div>'; return; }
        APP_SCRIPT_URL = newUrl;
        localStorage.setItem('coffeeland_script_url', APP_SCRIPT_URL);
        urlStatusDiv.innerHTML = '<div class="alert alert-success">✅ URL saved</div>';
        refreshBatchesDropdown();
    });
    refreshBatchesBtn.addEventListener('click', () => { if(APP_SCRIPT_URL) refreshBatchesDropdown(); else showMessage('Save URL first', true); });
    batchSelect.addEventListener('change', onBatchChange);
    submitBtn.addEventListener('click', submitAttendance);
    markAllPresent.addEventListener('click', () => markAll('Present'));
    markAllAbsent.addEventListener('click', () => markAll('Absent'));

    // Init
    setDefaultDate();
    if(APP_SCRIPT_URL) {
        urlInput.value = APP_SCRIPT_URL;
        urlStatusDiv.innerHTML = '<div class="alert alert-success">✅ Loaded from storage</div>';
        refreshBatchesDropdown();
    } else {
        urlStatusDiv.innerHTML = '<div class="alert alert-error">Paste your Apps Script URL and save</div>';
        batchSelect.innerHTML = '<option>Configure URL first</option>';
    }
</script>
</body>
</html>
