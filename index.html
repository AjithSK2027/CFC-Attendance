<!DOCTYPE html>
<html lang="en" class="h-full">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffeeland FC · Attendance</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-gold: #fbbf24;
    }
    
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    h1, h2, .font-display { font-family: 'Outfit', sans-serif; }
    
    body {
      background: radial-gradient(circle at top left, #0f172a 0%, #020617 40%, #000000 100%);
      color: #f1f5f9;
      letter-spacing: -0.01em;
    }

    .glass {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .premium-shadow {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #064e3b 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Fixed Dropdown Visibility */
    select, input {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      transition: all 0.2s ease;
    }

    select option {
      background-color: #0f172a !important; /* Dark background for dropdown options */
      color: white !important;
      padding: 12px;
    }

    input:focus, select:focus {
      border-color: #fbbf24 !important;
      outline: none;
      background: rgba(255, 255, 255, 0.1) !important;
    }

    .reveal { animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Custom Date Picker Icon Color */
    ::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }
  </style>
</head>
<body class="h-full">
<div id="app" class="h-full w-full overflow-auto pb-20">
  <div class="max-w-6xl mx-auto px-6 py-10 md:py-16">
    
    <!-- Header -->
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-16 reveal">
      <div class="flex items-center gap-6">
        <div class="bg-white rounded-full p-1 shadow-2xl">
          <img 
            src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" 
            alt="Logo" 
            class="w-20 h-20 md:w-24 md:h-24 object-contain"
          >
        </div>
        <div>
          <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight">
            COFFEELAND <span class="text-amber-500">FC</span>
          </h1>
          <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Attendance Manager</p>
        </div>
      </div>
      
      <button id="toggle-config" class="flex items-center gap-3 px-5 py-3 rounded-2xl glass hover:bg-white/5 transition-all">
        <span class="text-sm font-bold text-slate-300">Settings</span>
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
    </header>

    <main class="space-y-12">

      <!-- Simple Start Form -->
      <section class="glass rounded-[2.5rem] p-8 md:p-12 premium-shadow reveal">
        <h2 class="text-2xl font-bold text-white mb-8">Start Session</h2>
        
        <form id="session-form" class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Coach</label>
            <select id="coach-name" class="w-full px-6 py-4 rounded-2xl text-white font-bold cursor-pointer appearance-none" required>
              <option value="" disabled selected class="text-slate-500">Select Coach</option>
              <option value="Lexi">Lexi</option>
              <option value="Nithin">Nithin</option>
              <option value="Appu">Appu</option>
              <option value="Calvin">Calvin</option>
              <option value="Ajay">Ajay</option>
              <option value="Rayan">Rayan</option>
              <option value="Syed">Syed</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Group</label>
            <select id="batch-name" class="w-full px-6 py-4 rounded-2xl text-white font-bold cursor-pointer appearance-none" required>
              <option value="" disabled selected class="text-slate-500">Select Group</option>
              <option value="Kalyan Nagar">Kalyan Nagar</option>
              <option value="Xavier's School">Xavier's School</option>
              <option value="Monti Angels">Monti Angels</option>
              <option value="District Field Morning">District Field Morning</option>
              <option value="District Field Evening">District Field Evening</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Date</label>
            <input type="date" id="attendance-date" class="w-full px-6 py-4 rounded-2xl text-white font-bold" required>
          </div>

          <div class="md:col-span-3 pt-4">
            <button type="button" id="btn-load" class="w-full py-5 rounded-2xl btn-primary text-white font-bold text-sm uppercase tracking-widest">
              Load Players
            </button>
          </div>
        </form>
      </section>

      <!-- Settings Dropdown -->
      <div id="sheets-config" class="hidden glass rounded-[2.5rem] p-10 reveal">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-xl font-bold text-white">Google Sheets Links</h2>
          <button onclick="document.getElementById('sheets-config').classList.add('hidden')" class="text-slate-500 hover:text-white">Close</button>
        </div>
        <div class="space-y-6">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 mb-2">Web App URL</label>
            <input type="url" id="script-url" class="w-full px-5 py-4 rounded-xl text-white font-mono text-xs" value="https://script.google.com/macros/s/AKfycbxwgbS668l65jFXvNGk4RGcd8a0yelOCAeV-euPowFqgPoWJXjkQMH0n-cuwo1BP1Pe/exec">
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-[10px] font-bold text-slate-500 mb-2">Spreadsheet ID</label>
              <input type="text" id="sheet-id" class="w-full px-5 py-4 rounded-xl text-white text-sm" placeholder="Paste ID here">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-500 mb-2">Sheet Name</label>
              <input type="text" id="sheet-name" class="w-full px-5 py-4 rounded-xl text-white text-sm" value="Attendance">
            </div>
          </div>
          <button id="save-config" class="w-full py-4 rounded-xl btn-primary text-white font-bold text-xs uppercase tracking-widest">Save Settings</button>
        </div>
      </div>

      <!-- Attendance List -->
      <section id="students-section" class="hidden space-y-8 reveal">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="glass p-6 rounded-3xl text-center">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total</p>
            <p id="total-students" class="text-3xl font-black text-white">0</p>
          </div>
          <div class="glass p-6 rounded-3xl text-center border-green-500/20">
            <p class="text-[10px] font-bold text-green-500 uppercase tracking-widest mb-1">Present</p>
            <p id="marked-present" class="text-3xl font-black text-white">0</p>
          </div>
          <div class="glass p-6 rounded-3xl text-center border-red-500/20">
            <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest mb-1">Absent</p>
            <p id="marked-absent" class="text-3xl font-black text-white">0</p>
          </div>
          <div class="glass p-6 rounded-3xl text-center border-amber-500/20">
            <p class="text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-1">Ready</p>
            <p id="marked-count" class="text-3xl font-black text-white">0%</p>
          </div>
        </div>

        <div class="glass rounded-[2.5rem] overflow-hidden premium-shadow">
          <div class="px-8 py-8 border-b border-white/5 bg-white/5 flex flex-col md:flex-row items-center justify-between gap-6">
            <h2 class="text-2xl font-bold text-white tracking-tight">Mark Attendance</h2>
            <div class="flex gap-3">
              <button onclick="window.markAll('present')" class="px-5 py-2.5 rounded-xl bg-green-500/10 text-green-500 text-[10px] font-bold uppercase tracking-widest border border-green-500/20 hover:bg-green-500 hover:text-white transition-all">Select All</button>
              <button onclick="window.markAll('absent')" class="px-5 py-2.5 rounded-xl bg-white/5 text-slate-400 text-[10px] font-bold uppercase tracking-widest border border-white/10 hover:text-red-400">Clear</button>
            </div>
          </div>
          
          <div id="students-grid" class="p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto"></div>

          <div class="p-8 border-t border-white/5 bg-black/20 flex flex-col md:flex-row gap-4">
            <button id="btn-save" class="flex-[2] py-5 rounded-2xl btn-success text-white font-bold text-sm uppercase tracking-widest">
              Save Attendance
            </button>
            <button id="btn-cancel" class="flex-1 py-5 rounded-2xl bg-white/5 text-slate-500 font-bold text-sm uppercase tracking-widest hover:text-white">
              Cancel
            </button>
          </div>
        </div>
      </section>

      <!-- History Section -->
      <section class="reveal">
        <h2 class="text-xl font-bold text-white mb-6 px-4">Previous Records</h2>
        <div class="glass rounded-3xl overflow-hidden">
          <div id="attendance-list" class="divide-y divide-white/5">
             <div class="p-16 text-center text-slate-600 text-sm">Waiting for connection...</div>
          </div>
        </div>
      </section>

    </main>

    <footer class="mt-20 text-center opacity-30">
      <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.5em]">Coffeeland Football Club</p>
    </footer>
  </div>
</div>

<div id="toast-container" class="fixed bottom-10 right-10 z-[100] flex flex-col gap-3 pointer-events-none"></div>

<script>
(function() {
  const studentsByBatch = {
    'Kalyan Nagar': ['MOHITH.S','Rishanth R Shekar','Gahan','RUTVIK','Sohan R Prasad','Gagan gowda.B.M','Mohith T','Gokul','THEJAS KN','CHIRANTH BK','Shrinik U Y','HIMAVANTH CJ','Ganav r','SHAMAN GOWDA N N','SHRIMAN GOWDA N N','Dhanvith p Gowda','Dhanyatha p','Swayam','Samanvith Rao D M','Sai pranav','Dishanth HL','Manvith.S','RAJATH .S','Nishanth S. V','Hoysala M Hrushikesh'],
    'Xavier\'s School': ['AIMA','PREETHAM HM','SAMBRAMA.S','DHANVISH','VISMITHA','YASHWANTH BJ','ULLAS','JASHITH C','SAMARTH','SARVAJITH','THANUSH','PUNITH','PAVAN','BHUVAN S','CHIRANTH','AARIZ','RIVON','DEEKSHA','PRAJWAL','ANHAR','UMAIR','AVINASH','LIKITH','SOHAN','KRUTHIK','SAAMAR','LIKITHA','IBRAHIM','MALCUM','SAMARTH B','VINISH','SHAUN D','GOKUL','CHIRANJITH M','HUSNA','ASJAD','IMPAN'],
    'Monti Angels': ['MD IFAZ','AAHIL','MD RAAFI','MD AAZZ','UMAR','UNAIZ','AFFAN','RISHAN','MD ARHAAN','MD YUSUF ARMAN','KSHAMAN U.G','RISHIK PONNAPPA','IRSHAD BAIG','MD HAMZA','SK SAMDHANI','MD SHAYAN','MD UMAR','NOUFAL U.S','MD RIFAHATH','MD ARHAN','MD ARMAAN NAWAZ','MD MUBASHER','ABDUL AZEEM','SHINAF IBRAHIM','ANTHONY','TANISH SHANBOGH','MOHAN GOWDA','MOHAMMED SHARIQ','MD RAHIL','SK AZIZ','AMAN BAIG','HARSHAVARDHANA','MD RAYAAN','AARIZ RAZA','MEHHAROOF','PAYAM','PAIMAN','RISHAB','TALHA','RAHIL','ISMAIL','YADHUVAMSHIK','AFNAN','SHISHIR'],
    'District Field Morning': ['Player A', 'Player B'],
    'District Field Evening': ['Player X', 'Player Y']
  };

  let sessionAttendance = {};
  let currentSession = { coach: '', batch: '', date: '' };
  let config = {
    scriptUrl: 'https://script.google.com/macros/s/AKfycbxwgbS668l65jFXvNGk4RGcd8a0yelOCAeV-euPowFqgPoWJXjkQMH0n-cuwo1BP1Pe/exec',
    sheetId: '',
    sheetName: 'Attendance'
  };

  function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `glass px-6 py-4 rounded-2xl shadow-xl font-bold text-white reveal pointer-events-auto border-l-4 ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
    toast.innerHTML = `<span class="text-sm">${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 4000);
  }

  async function callSheetsAPI(payload) {
    try {
      const response = await fetch(config.scriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (e) { return null; }
  }

  function renderGrid() {
    const grid = document.getElementById('students-grid');
    const students = studentsByBatch[currentSession.batch] || [];

    grid.innerHTML = students.map((name, i) => {
      const isPresent = sessionAttendance[name] === 'present';
      return `
        <div onclick="window.toggle(${i})" class="p-5 rounded-2xl border cursor-pointer glass transition-all flex items-center justify-between ${isPresent ? 'border-green-500/40 bg-green-500/5' : 'border-white/5 hover:border-white/20'}">
          <p class="text-sm font-bold ${isPresent ? 'text-white' : 'text-slate-400'}">${name}</p>
          <div class="w-10 h-5 rounded-full relative transition-colors ${isPresent ? 'bg-green-500' : 'bg-slate-800'}">
            <div class="absolute top-1 left-1 w-3 h-3 rounded-full bg-white transition-transform" style="transform: translateX(${isPresent ? '20px' : '0'})"></div>
          </div>
        </div>
      `;
    }).join('');

    const stats = {
      total: students.length,
      present: Object.values(sessionAttendance).filter(v => v === 'present').length,
      absent: Object.values(sessionAttendance).filter(v => v === 'absent').length
    };
    document.getElementById('total-students').textContent = stats.total;
    document.getElementById('marked-present').textContent = stats.present;
    document.getElementById('marked-absent').textContent = stats.absent;
    document.getElementById('marked-count').textContent = stats.total ? Math.round(((stats.present + stats.absent) / stats.total) * 100) + '%' : '0%';
  }

  window.toggle = (idx) => {
    const name = studentsByBatch[currentSession.batch][idx];
    sessionAttendance[name] = sessionAttendance[name] === 'present' ? 'absent' : 'present';
    renderGrid();
  };

  window.markAll = (status) => {
    Object.keys(sessionAttendance).forEach(k => sessionAttendance[k] = status);
    renderGrid();
  };

  async function refreshRecords() {
    const list = document.getElementById('attendance-list');
    list.innerHTML = '<div class="p-12 text-center text-slate-500 text-xs font-bold animate-pulse">REFRESHING...</div>';
    const res = await callSheetsAPI({ action: 'read', spreadsheetId: config.sheetId, sheetName: config.sheetName, limit: 12 });
    if (res && res.records) {
      list.innerHTML = res.records.map(r => `
        <div class="flex items-center justify-between px-8 py-5 hover:bg-white/[0.02]">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-[10px] font-black text-slate-600 border border-white/5">${r.student_name.substring(0,2)}</div>
            <div>
              <p class="text-sm font-bold text-white">${r.student_name}</p>
              <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">${r.batch} • Coach ${r.coach}</p>
            </div>
          </div>
          <div class="px-4 py-1.5 rounded-lg text-[9px] font-bold uppercase ${r.status === 'present' ? 'text-green-500 bg-green-500/10' : 'text-red-500 bg-red-500/10'}">${r.status}</div>
        </div>
      `).join('') || '<div class="p-12 text-center text-slate-600">No recent activity.</div>';
    } else {
      list.innerHTML = '<div class="p-12 text-center text-slate-700 text-xs font-bold">Connect to sheets to see history</div>';
    }
  }

  document.getElementById('btn-load').onclick = () => {
    const coach = document.getElementById('coach-name').value;
    const batch = document.getElementById('batch-name').value;
    const date = document.getElementById('attendance-date').value;
    if (!coach || !batch || !date) return showToast('Fill all fields first', 'error');
    currentSession = { coach, batch, date };
    sessionAttendance = {};
    (studentsByBatch[batch] || []).forEach(name => sessionAttendance[name] = 'absent');
    document.getElementById('students-section').classList.remove('hidden');
    renderGrid();
    document.getElementById('students-section').scrollIntoView({ behavior: 'smooth' });
  };

  document.getElementById('btn-save').onclick = async () => {
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = 'Saving...';
    const records = Object.entries(sessionAttendance).map(([name, status]) => ({
      timestamp: new Date().toLocaleString(), date: currentSession.date, coach: currentSession.coach, batch: currentSession.batch, student_name: name, status: status
    }));
    const res = await callSheetsAPI({ action: 'append', spreadsheetId: config.sheetId, sheetName: config.sheetName, data: records });
    btn.disabled = false; btn.textContent = 'Save Attendance';
    if (res) { 
      showToast('Saved to sheets'); 
      document.getElementById('students-section').classList.add('hidden'); 
      refreshRecords(); 
      window.scrollTo({ top: 0, behavior: 'smooth' }); 
    } else { showToast('Connection failed', 'error'); }
  };

  document.getElementById('save-config').onclick = () => {
    config.scriptUrl = document.getElementById('script-url').value;
    config.sheetId = document.getElementById('sheet-id').value;
    config.sheetName = document.getElementById('sheet-name').value;
    document.getElementById('sheets-config').classList.add('hidden');
    showToast('Settings saved');
    refreshRecords();
  };

  document.getElementById('toggle-config').onclick = () => document.getElementById('sheets-config').classList.toggle('hidden');
  document.getElementById('btn-cancel').onclick = () => { document.getElementById('students-section').classList.add('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  document.getElementById('attendance-date').valueAsDate = new Date();
  refreshRecords();
})();
</script>
</body>

</html>
