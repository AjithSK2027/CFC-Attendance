<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffeeland FC | Pro Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        coffee: {
                            950: '#0A0705',
                            900: '#150E0A',
                            800: '#1E140F',
                            700: '#2C1D16',
                            accent: '#D4AF37',
                            gold: '#F9D978',
                            light: '#F5E6D3'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0A0705;
            color: #F5E6D3;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(30, 20, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.12);
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.1) 0%, rgba(21, 14, 10, 0.4) 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .premium-toggle input { display: none; }
        
        .toggle-track {
            width: 52px;
            height: 28px;
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 9999px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-thumb {
            width: 20px;
            height: 20px;
            background-color: #EF4444;
            border-radius: 50%;
            position: absolute;
            left: 3px;
            top: 3px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .premium-toggle input:checked + .toggle-track {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .premium-toggle input:checked + .toggle-track .toggle-thumb {
            background-color: #10B981;
            transform: translateX(24px);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        
        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
    </style>
</head>

<body class="min-h-screen pb-24">
    <div class="h-1.5 w-full bg-gradient-to-r from-coffee-accent via-coffee-gold to-coffee-accent opacity-50"></div>

    <div class="max-w-xl mx-auto px-4 pt-8 space-y-6">
        
        <header class="text-center space-y-2 animate-slide-up">
            <div class="inline-block p-4 rounded-3xl glass-panel shadow-2xl mb-2">
                <span class="text-4xl">⚽</span>
            </div>
            <h1 class="text-3xl font-800 tracking-tighter text-white">COFFEELAND <span class="text-coffee-accent">FC</span></h1>
            <p class="text-xs font-bold tracking-[0.3em] text-coffee-accent/60 uppercase">Management Command</p>
        </header>

        <section class="glass-panel rounded-[2rem] p-6 space-y-4 animate-slide-up" style="animation-delay: 0.1s">
            <div class="space-y-4">
                <div class="relative">
                    <label class="text-[10px] font-bold text-coffee-accent uppercase tracking-widest ml-1 mb-1 block">Active Session</label>
                    <select id="batchSelect" class="w-full bg-coffee-950/50 border border-coffee-accent/20 rounded-2xl py-4 px-4 text-white appearance-none focus:border-coffee-accent transition-all outline-none">
                        <option value="">Syncing Batches...</option>
                    </select>
                    <div class="absolute right-4 bottom-4 pointer-events-none text-coffee-accent">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>

                <button onclick="fetchRoster()" id="loadBtn" class="w-full bg-gradient-to-br from-coffee-accent to-[#B89328] text-coffee-950 font-bold py-4 rounded-2xl shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    INITIALIZE ROSTER
                </button>
            </div>
        </section>

        <div id="loadingIndicator" class="hidden flex-col items-center py-12">
            <div class="w-10 h-10 border-4 border-coffee-accent/20 border-t-coffee-accent rounded-full animate-spin mb-4"></div>
            <p class="text-sm font-medium text-coffee-accent/60 tracking-widest uppercase">Accessing G-Sheets...</p>
        </div>

        <main id="rosterPanel" class="hidden space-y-6 animate-slide-up">
            
            <div class="grid grid-cols-3 gap-3">
                <div class="stat-card rounded-2xl p-3 text-center">
                    <p class="text-[10px] font-bold text-coffee-accent/60 uppercase">Present</p>
                    <p id="statPresent" class="text-2xl font-800 text-white">0</p>
                </div>
                <div class="stat-card rounded-2xl p-3 text-center border-l-red-500/20">
                    <p class="text-[10px] font-bold text-red-400/60 uppercase">Absent</p>
                    <p id="statAbsent" class="text-2xl font-800 text-white">0</p>
                </div>
                <div class="stat-card rounded-2xl p-3 text-center">
                    <p class="text-[10px] font-bold text-blue-400/60 uppercase">Coaches</p>
                    <p id="statCoaches" class="text-2xl font-800 text-white">0</p>
                </div>
            </div>

            <div class="glass-panel rounded-[2rem] p-6 space-y-8">
                <div class="flex items-center justify-between border-b border-coffee-accent/10 pb-4">
                    <h3 class="font-bold text-lg">Session Log</h3>
                    <input type="date" id="attendanceDate" class="bg-transparent text-coffee-accent font-bold text-sm outline-none">
                </div>

                <section>
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-coffee-accent animate-pulse"></span>
                            <h4 class="text-xs font-bold text-coffee-accent uppercase tracking-widest">Instructors</h4>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="toggleAll('attendance_coach', true)" class="text-[10px] font-bold text-coffee-light/40 hover:text-coffee-accent uppercase">All</button>
                            <button onclick="toggleAll('attendance_coach', false)" class="text-[10px] font-bold text-coffee-light/40 hover:text-red-400 uppercase">None</button>
                        </div>
                    </div>
                    <div id="coachesList" class="space-y-3"></div>
                </section>

                <section>
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                            <h4 class="text-xs font-bold text-blue-400 uppercase tracking-widest">Athletes</h4>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="toggleAll('attendance_student', true)" class="text-[10px] font-bold text-coffee-light/40 hover:text-coffee-accent uppercase">All</button>
                            <button onclick="toggleAll('attendance_student', false)" class="text-[10px] font-bold text-coffee-light/40 hover:text-red-400 uppercase">None</button>
                        </div>
                    </div>
                    <div id="studentsList" class="space-y-3"></div>
                </section>

                <button onclick="submitAttendance()" id="submitBtn" class="w-full bg-white text-coffee-950 font-800 py-5 rounded-2xl shadow-2xl active:scale-[0.97] transition-all flex items-center justify-center gap-3">
                    COMMIT ATTENDANCE
                </button>
            </div>
        </main>

        <div id="successMsg" class="hidden fixed bottom-8 left-4 right-4 z-50 animate-slide-up">
            <div class="bg-green-500 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-4">
                <div class="bg-white/20 p-2 rounded-full">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div>
                    <p class="font-bold">Session Transmitted</p>
                    <p class="text-xs opacity-90">Google Sheets updated successfully.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhMqGlvOjcYsMVD20whdfoXhrlH4ukCUqumBO4tcwi6d9-I4o88H3jtcoFWVbHOdYEYg/exec";

        document.getElementById('attendanceDate').valueAsDate = new Date();

        window.onload = async () => {
            const select = document.getElementById('batchSelect');
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getBatches`, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                select.innerHTML = '<option value="">Select Target Batch</option>';
                if (data.batches) {
                    data.batches.forEach(b => {
                        select.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                    });
                }
            } catch (err) {
                select.innerHTML = '<option value="">⚠️ Sync Failed</option>';
            }
        };

        async function fetchRoster() {
            const batchName = document.getElementById('batchSelect').value;
            const btn = document.getElementById('loadBtn');
            if (!batchName) return;

            document.getElementById('rosterPanel').classList.add('hidden');
            document.getElementById('loadingIndicator').classList.remove('hidden');
            btn.disabled = true;

            try {
                const response = await fetch(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}`, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                renderList('coachesList', data.coaches, 'coach');
                renderList('studentsList', data.students, 'student');
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('rosterPanel').classList.remove('hidden');
                updateStats();
            } catch (err) {
                alert("Connection failed.");
            } finally {
                btn.disabled = false;
            }
        }

        function renderList(containerId, people, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = people?.length ? '' : '<p class="text-center py-4 text-coffee-light/20 text-sm">No data found</p>';
            
            people?.forEach((person, index) => {
                const id = `${type}_${index}`;
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 rounded-2xl bg-coffee-800/40 border border-white/5 active:bg-coffee-700/50 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-coffee-950 flex items-center justify-center border border-coffee-accent/20 font-bold text-coffee-accent text-sm">
                                ${person.name.charAt(0).toUpperCase()}
                            </div>
                            <span class="font-bold text-white/90">${person.name}</span>
                        </div>
                        <label class="premium-toggle">
                            <input type="checkbox" name="attendance_${type}" id="${id}" value="${person.name}" checked onchange="updateStats()">
                            <div class="toggle-track"><div class="toggle-thumb"></div></div>
                        </label>
                    </div>
                `;
            });
        }

        function toggleAll(name, state) {
            document.querySelectorAll(`input[name="${name}"]`).forEach(cb => cb.checked = state);
            updateStats();
        }

        function updateStats() {
            const coaches = document.querySelectorAll('input[name="attendance_coach"]:checked').length;
            const studentsPresent = document.querySelectorAll('input[name="attendance_student"]:checked').length;
            const studentsAbsent = document.querySelectorAll('input[name="attendance_student"]:not(:checked)').length;

            document.getElementById('statPresent').innerText = studentsPresent;
            document.getElementById('statAbsent').innerText = studentsAbsent;
            document.getElementById('statCoaches').innerText = coaches;
        }

        async function submitAttendance() {
            const batchName = document.getElementById('batchSelect').value;
            const date = document.getElementById('attendanceDate').value;
            const btn = document.getElementById('submitBtn');
            if (!batchName || !date) return;

            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-coffee-950/30 border-t-coffee-950 rounded-full animate-spin"></div> SYNCING...`;

            const records = [];
            ['coach', 'student'].forEach(type => {
                document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(input => {
                    records.push({
                        personType: type,
                        date: date,
                        batchName: batchName,
                        personName: input.value,
                        status: input.checked ? 'Present' : 'Absent'
                    });
                });
            });

            const formData = new URLSearchParams();
            formData.append('payload', JSON.stringify({ action: "saveAttendance", data: records }));

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: formData
                });
                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('rosterPanel').classList.add('hidden');
                    const toast = document.getElementById('successMsg');
                    toast.classList.remove('hidden');
                    setTimeout(() => {
                        toast.classList.add('hidden');
                        document.getElementById('batchSelect').value = '';
                    }, 4000);
                    window.scrollTo(0, 0);
                }
            } catch (err) {
                alert("Critical transmission failure.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
