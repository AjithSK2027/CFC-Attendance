<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <link rel="icon" type="image/png" href="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coffeeland FC · Attendance</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --brand-gold: #fbbf24; }
    * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; }
    h1, h2, .font-display { font-family: 'Outfit', sans-serif; }
    
    body {
      background: radial-gradient(circle at top left, #0f172a 0%, #020617 40%, #000000 100%);
      color: #f1f5f9;
      letter-spacing: -0.01em;
      margin: 0;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .premium-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #064e3b 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    select, input {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      width: 100% !important;
    }

    .reveal { animation: revealUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    input[type="date"] {
      color-scheme: dark;
      position: relative;
    }

    ::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: auto; height: auto;
      color: transparent;
      background: transparent;
    }

    .coach-badge {
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
    }
    
    .batch-chip {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: bold;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .batch-chip:hover, .batch-chip.active {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }
    
    #debug-console {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.95);
      color: #4ade80;
      font-family: monospace;
      font-size: 11px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      border-top: 2px solid #fbbf24;
    }
  </style>
</head>

<body class="h-full">
<div id="app" class="h-full w-full overflow-x-hidden overflow-y-auto pb-20">
  <div class="max-w-6xl mx-auto px-4 py-8 md:py-16">
    
    <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12 reveal">
      <div class="flex items-center gap-4">
        <div class="bg-white rounded-full p-1 shadow-2xl shrink-0">
          <img src="https://i.ibb.co/KjC62kc0/1000287652-0b4cd8d123cf04f03fc322309c337390-11-18-2025-1-04-51-PM.png" alt="Logo" class="w-16 h-16 md:w-24 md:h-24 object-contain">
        </div>
        <div>
          <h1 class="text-3xl md:text-5xl font-black text-white tracking-tight">COFFEELAND <span class="text-amber-500">FC</span></h1>
          <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">Attendance Manager</p>
        </div>
      </div>
      <button id="toggle-config" class="flex items-center justify-center gap-3 px-5 py-3 rounded-2xl glass hover:bg-white/5 transition-all w-fit">
        <span class="text-sm font-bold text-slate-300">Settings</span>
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
    </header>

    <main class="space-y-10">
      <section class="glass rounded-[2rem] p-6 md:p-12 premium-shadow reveal">
        <div class="flex flex-wrap gap-3 mb-8">
          <button id="btn-open-fees" class="flex-1 py-4 rounded-2xl glass border-amber-500/30 text-amber-500 font-bold text-xs uppercase tracking-widest hover:bg-amber-500/10 transition-all flex items-center justify-center gap-2">
            <span>💳</span> Fees & Reminders
          </button>
          <button id="btn-coach-attendance" class="flex-1 py-4 rounded-2xl coach-badge text-white font-bold text-xs uppercase tracking-widest hover:opacity-90 transition-all flex items-center justify-center gap-2">
            <span>👥</span> Coach Attendance
          </button>
        </div>
        
        <h2 class="text-2xl font-bold text-white mb-8">Start Session</h2>
        <form id="session-form" class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Coach</label>
            <select id="coach-name" class="px-6 py-4 rounded-2xl text-white font-bold bg-transparent border border-white/10 appearance-none w-full cursor-pointer" required>
              <option value="" disabled selected>Select Coach</option>
              <option value="Lexi">Lexi</option><option value="Nithin">Nithin</option><option value="Appu">Appu</option>
              <option value="Calvin">Calvin</option><option value="Ajay">Ajay</option><option value="Rayan">Rayan</option>
              <option value="Syed">Syed</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Group</label>
            <select id="batch-name" class="px-6 py-4 rounded-2xl text-white font-bold bg-transparent border border-white/10 appearance-none w-full cursor-pointer" required>
              <option value="" disabled selected>Select Group</option>
              <option value="Kalyan Nagar">Kalyan Nagar</option>
              <option value="Xavier's School">Xavier's School</option>
              <option value="Monti Angels">Monti Angels</option>
              <option value="District Field Morning">District Field Morning</option>
              <option value="District Field Evening">District Field Evening</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Date</label>
            <input type="date" id="attendance-date" class="px-6 py-5 rounded-2xl text-white font-bold bg-transparent border border-white/10 appearance-none w-full" style="color-scheme: dark; min-height: 60px;">
          </div>
          <div class="md:col-span-3 pt-4">
            <button type="button" id="btn-load" class="w-full py-5 rounded-2xl btn-primary text-white font-bold text-sm uppercase tracking-widest">Load Players</button>
          </div>
        </form>
      </section>

      <div id="sheets-config" class="hidden glass rounded-[2rem] p-6 md:p-10 reveal">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-xl font-bold text-white">Settings</h2>
          <button onclick="document.getElementById('sheets-config').classList.add('hidden')" class="text-slate-500 hover:text-white font-bold">✕</button>
        </div>
        <div class="space-y-6">
          <div>
            <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Web App URL</label>
            <input type="url" id="script-url" class="px-5 py-4 rounded-xl text-white font-mono text-xs" value="YOUR_SCRIPT_URL_HERE">
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Spreadsheet ID</label>
              <input type="text" id="sheet-id" class="px-5 py-4 rounded-xl text-white text-sm" placeholder="Paste ID here">
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Sheet Name</label>
              <input type="text" id="sheet-name" class="px-5 py-4 rounded-xl text-white text-sm" value="Attendance">
            </div>
          </div>
          <button id="save-config" class="w-full py-4 rounded-xl btn-primary text-white font-bold text-xs uppercase tracking-widest">Save Settings</button>
        </div>
      </div>

      <section id="students-section" class="hidden space-y-6 reveal">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div class="glass p-4 rounded-2xl text-center">
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total</p>
            <p id="total-students" class="text-2xl font-black text-white">0</p>
          </div>
          <div class="glass p-4 rounded-2xl text-center border-green-500/20">
            <p class="text-[9px] font-bold text-green-500 uppercase tracking-widest mb-1">Present</p>
            <p id="marked-present" class="text-2xl font-black text-white">0</p>
          </div>
          <div class="glass p-4 rounded-2xl text-center border-red-500/20">
            <p class="text-[9px] font-bold text-red-500 uppercase tracking-widest mb-1">Absent</p>
            <p id="marked-absent" class="text-2xl font-black text-white">0</p>
          </div>
          <div class="glass p-4 rounded-2xl text-center border-amber-500/20">
            <p class="text-[9px] font-bold text-amber-500 uppercase tracking-widest mb-1">Ready</p>
            <p id="marked-count" class="text-2xl font-black text-white">0%</p>
          </div>
        </div>

        <div class="glass rounded-[2rem] overflow-hidden premium-shadow">
          <div class="px-6 py-6 border-b border-white/5 bg-white/5 flex flex-col gap-4">
            <h2 class="text-xl font-bold text-white tracking-tight">Mark Attendance</h2>
            <div class="flex gap-2">
              <button onclick="window.markAll('present')" class="flex-1 py-2 rounded-xl bg-green-500/10 text-green-500 text-[10px] font-bold uppercase tracking-widest border border-green-500/20">Select All</button>
              <button onclick="window.markAll('absent')" class="flex-1 py-2 rounded-xl bg-white/5 text-slate-400 text-[10px] font-bold uppercase tracking-widest border border-white/10">Clear</button>
            </div>
          </div>
          
          <div id="students-grid" class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 max-h-[400px] overflow-y-auto"></div>

          <div class="p-6 border-t border-white/5 bg-black/20 flex flex-col gap-3">
            <button id="btn-save" class="w-full py-5 rounded-2xl btn-success text-white font-bold text-sm uppercase tracking-widest">Save Attendance</button>
            <button id="btn-cancel" class="w-full py-4 rounded-2xl bg-white/5 text-slate-500 font-bold text-xs uppercase tracking-widest">Cancel</button>
          </div>
        </div>
      </section>

      <!-- Coach Attendance Section -->
      <section id="coach-section" class="hidden space-y-6 reveal">
        <div class="glass rounded-[2rem] overflow-hidden premium-shadow border-amber-500/20 border-2">
          <div class="px-6 py-6 bg-gradient-to-r from-amber-500/10 to-transparent border-b border-amber-500/20">
            <div class="flex items-center justify-between">
              <div>
                <h2 class="text-xl font-bold text-white tracking-tight flex items-center gap-2">
                  <span class="coach-badge w-8 h-8 rounded-lg flex items-center justify-center text-black">👥</span>
                  Coach Attendance
                </h2>
                <p id="coach-date-display" class="text-amber-500 text-[10px] font-bold uppercase tracking-widest mt-1"></p>
              </div>
              <div class="flex gap-2">
                <button onclick="window.markAllCoaches('present')" class="px-4 py-2 rounded-xl bg-green-500/10 text-green-500 text-[10px] font-bold uppercase tracking-widest border border-green-500/20">All Present</button>
                <button onclick="window.markAllCoaches('absent')" class="px-4 py-2 rounded-xl bg-white/5 text-slate-400 text-[10px] font-bold uppercase tracking-widest border border-white/10">All Absent</button>
              </div>
            </div>
          </div>
          
          <div id="coaches-grid" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto"></div>

          <div class="p-6 border-t border-amber-500/20 bg-black/20 flex flex-col gap-3">
            <button id="btn-save-coach" class="w-full py-5 rounded-2xl coach-badge text-white font-bold text-sm uppercase tracking-widest">Save Coach Attendance</button>
            <button id="btn-cancel-coach" class="w-full py-4 rounded-2xl bg-white/5 text-slate-500 font-bold text-xs uppercase tracking-widest">Close</button>
          </div>
        </div>
      </section>

      <section id="fee-tracker-section" class="hidden glass rounded-[2rem] p-6 md:p-12 premium-shadow reveal mt-10">
        <div class="flex justify-between items-center mb-8">
          <div>
            <h2 class="text-2xl font-bold text-white font-display">Fee Collector</h2>
            <p id="fee-batch-label" class="text-amber-500 text-[10px] font-bold uppercase tracking-widest mt-1">Select a group first</p>
          </div>
          <button onclick="document.getElementById('fee-tracker-section').classList.add('hidden')" class="text-slate-500 hover:text-white font-bold text-xs uppercase">✕ Close</button>
        </div>
        <div id="fees-list-container" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></div>
      </section>

      <section class="reveal px-2">
        <h2 class="text-lg font-bold text-white mb-4">Previous Records</h2>
        <div class="glass rounded-3xl overflow-hidden">
          <div id="attendance-list" class="divide-y divide-white/5">
            <div class="p-10 text-center text-slate-600 text-xs">Configure settings and save to load records</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="mt-16 text-center opacity-30">
      <p class="text-slate-500 text-[9px] font-bold uppercase tracking-[0.4em]">Coffeeland Football Club</p>
    </footer>
  </div>
</div>

<div id="toast-container" class="fixed bottom-6 right-6 left-6 md:left-auto z-[100] flex flex-col gap-3 pointer-events-none"></div>
<div id="debug-console" class="hidden"></div>

<script>
(function() {
  // ==================== DATA ====================
  const studentsByBatch = {
    'Kalyan Nagar': ['MOHITH.S','Rishanth R Shekar','Gahan','RUTVIK','Sohan R Prasad','Gagan gowda.B.M','Mohith T','Gokul','THEJAS KN','CHIRANTH BK','Shrinik U Y','HIMAVANTH CJ','Ganav r','SHAMAN GOWDA N N','SHRIMAN GOWDA N N','Dhanvith p Gowda','Dhanyatha p','Swayam','Samanvith Rao D M','Sai pranav','Dishanth HL','Manvith.S','RAJATH .S','Nishanth S. V','Hoysala M Hrushikesh'],
    'Xavier\'s School': ['AIMA','PREETHAM HM','SAMBRAMA.S','DHANVISH','VISMITHA','YASHWANTH BJ','ULLAS','JASHITH C','SAMARTH','SARVAJITH','THANUSH','PUNITH','PAVAN','BHUVAN S','CHIRANTH','AARIZ','RIVON','DEEKSHA','PRAJWAL','ANHAR','UMAIR','AVINASH','LIKITH','SOHAN','KRUTHIK','SAAMAR','LIKITHA','IBRAHIM','MALCUM','SAMARTH B','VINISH','SHAUN D','GOKUL','CHIRANJITH M','HUSNA','ASJAD','IMPAN'],
    'Monti Angels': ['MD IFAZ','AAHIL','MD RAAFI','MD AAZZ','UMAR','UNAIZ','AFFAN','RISHAN','MD ARHAAN','MD YUSUF ARMAN','KSHAMAN U.G','RISHIK PONNAPPA','IRSHAD BAIG','MD HAMZA','SK SAMDHANI','MD SHAYAN','MD UMAR','NOUFAL U.S','MD RIFAHATH','MD ARHAN','MD ARMAAN NAWAZ','MD MUBASHER','ABDUL AZEEM','SHINAF IBRAHIM','ANTHONY','TANISH SHANBOGH','MOHAN GOWDA','MOHAMMED SHARIQ','MD RAHIL','SK AZIZ','AMAN BAIG','HARSHAVARDHANA','MD RAYAAN','AARIZ RAZA','MEHHAROOF','PAYAM','PAIMAN','RISHAB','TALHA','RAHIL','ISMAIL','YADHUVAMSHIK','AFNAN','SHISHIR'],
    'District Field Morning': ['Player A', 'Player B'],
    'District Field Evening': ['Player X', 'Player Y']
  };
  
  const pricingByBatch = {
    'Kalyan Nagar': 2500,
    "Xavier's School": 2000,
    'Monti Angels': 1800,
    'District Field Morning': 3000,
    'District Field Evening': 3500
  };

  const coaches = ['Lexi', 'Nithin', 'Appu', 'Calvin', 'Ajay', 'Rayan', 'Syed'];
  
  // ==================== STATE ====================
  let sessionAttendance = {};
  let coachAttendance = {};
  let currentSession = { coach: '', batch: '', date: '' };
  let config = {
    scriptUrl: '',
    sheetId: '',
    sheetName: 'Attendance'
  };

  // ==================== HELPER FUNCTIONS ====================
  function debugLog(message, data = null) {
    const debugDiv = document.getElementById('debug-console');
    debugDiv.classList.remove('hidden');
    const timestamp = new Date().toLocaleTimeString();
    let logMessage = `<div style="border-bottom:1px solid #333; padding:4px 0;"><span style="color:#fbbf24;">[${timestamp}]</span> ${message}`;
    if (data) {
      logMessage += `<pre style="margin:4px 0 0 12px; color:#4ade80; font-size:10px;">${JSON.stringify(data, null, 2)}</pre>`;
    }
    logMessage += '</div>';
    debugDiv.innerHTML += logMessage;
    debugDiv.scrollTop = debugDiv.scrollHeight;
    console.log(message, data);
  }

  function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `glass px-6 py-4 rounded-2xl shadow-xl font-bold text-white reveal pointer-events-auto border-l-4 ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
    toast.innerHTML = `<span class="text-xs">${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => { 
      toast.style.opacity = '0'; 
      setTimeout(() => toast.remove(), 400); 
    }, 4000);
  }

  async function callSheetsAPI(payload) {
    if (!config.scriptUrl || !config.sheetId) {
      showToast('Please configure settings first', 'error');
      return null;
    }
    
    debugLog('Sending to AppScript:', payload);
    
    try {
      // Add cache buster
      const url = config.scriptUrl + '?t=' + Date.now();
      
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      
      const responseText = await response.text();
      debugLog('Raw response:', responseText);
      
      // Try to parse JSON
      try {
        const jsonResponse = JSON.parse(responseText);
        debugLog('Parsed response:', jsonResponse);
        return jsonResponse;
      } catch (e) {
        debugLog('Response is not JSON:', responseText);
        showToast('Server returned invalid response', 'error');
        return { result: 'error', message: 'Invalid JSON response' };
      }
      
    } catch (e) { 
      debugLog('Fetch error:', e.message);
      showToast('Network error: ' + e.message, 'error');
      return null; 
    }
  }

  // ==================== RENDER FUNCTIONS ====================
  function renderGrid() {
    const grid = document.getElementById('students-grid');
    const students = studentsByBatch[currentSession.batch] || [];
    
    if (students.length === 0) {
      grid.innerHTML = '<div class="col-span-3 text-center p-8 text-slate-500">No students in this batch</div>';
      return;
    }
    
    grid.innerHTML = students.map((name, i) => {
      const isPresent = sessionAttendance[name] === 'present';
      return `
        <div onclick="window.toggle(${i})" class="p-4 rounded-xl border cursor-pointer glass transition-all flex items-center justify-between ${isPresent ? 'border-green-500/40 bg-green-500/5' : 'border-white/5 hover:border-white/20'}">
          <p class="text-xs font-bold ${isPresent ? 'text-white' : 'text-slate-400'}">${name}</p>
          <div class="w-8 h-4 rounded-full relative ${isPresent ? 'bg-green-500' : 'bg-slate-800'}">
            <div class="absolute top-1 left-1 w-2 h-2 rounded-full bg-white transition-transform" style="transform: translateX(${isPresent ? '16px' : '0'})"></div>
          </div>
        </div>
      `;
    }).join('');
    
    updateStats();
  }

  function renderCoaches() {
    const grid = document.getElementById('coaches-grid');
    const date = document.getElementById('attendance-date').value;
    document.getElementById('coach-date-display').textContent = `Date: ${date || 'Not selected'}`;
    
    grid.innerHTML = coaches.map((name) => {
      const isPresent = coachAttendance[name] === 'present';
      return `
        <div onclick="window.toggleCoach('${name}')" class="p-4 rounded-xl border cursor-pointer glass transition-all flex items-center justify-between ${isPresent ? 'border-amber-500/40 bg-amber-500/5' : 'border-white/5 hover:border-white/20'}">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg coach-badge flex items-center justify-center text-black font-bold text-xs">${name.substring(0,2)}</div>
            <p class="text-xs font-bold ${isPresent ? 'text-white' : 'text-slate-400'}">${name}</p>
          </div>
          <div class="w-8 h-4 rounded-full relative ${isPresent ? 'bg-amber-500' : 'bg-slate-800'}">
            <div class="absolute top-1 left-1 w-2 h-2 rounded-full bg-white transition-transform" style="transform: translateX(${isPresent ? '16px' : '0'})"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  function updateStats() {
    const students = studentsByBatch[currentSession.batch] || [];
    const stats = {
      total: students.length,
      present: Object.values(sessionAttendance).filter(v => v === 'present').length,
      absent: Object.values(sessionAttendance).filter(v => v === 'absent').length
    };
    document.getElementById('total-students').textContent = stats.total;
    document.getElementById('marked-present').textContent = stats.present;
    document.getElementById('marked-absent').textContent = stats.absent;
    document.getElementById('marked-count').textContent = stats.total ? Math.round(((stats.present + stats.absent) / stats.total) * 100) + '%' : '0%';
  }

  // ==================== WINDOW FUNCTIONS ====================
  window.toggle = (idx) => {
    const name = studentsByBatch[currentSession.batch][idx];
    sessionAttendance[name] = sessionAttendance[name] === 'present' ? 'absent' : 'present';
    renderGrid();
  };

  window.toggleCoach = (name) => {
    coachAttendance[name] = coachAttendance[name] === 'present' ? 'absent' : 'present';
    renderCoaches();
  };

  window.markAll = (status) => {
    Object.keys(sessionAttendance).forEach(k => sessionAttendance[k] = status);
    renderGrid();
  };

  window.markAllCoaches = (status) => {
    coaches.forEach(name => coachAttendance[name] = status);
    renderCoaches();
  };

  window.sendReminder = (name, amount) => {
    const month = new Intl.DateTimeFormat('en-US', { month: 'long' }).format(new Date());
    const msg = `*COFFEELAND FC - FEE REMINDER*%0A%0AHi! Friendly reminder that the fees for *${name}* for ${month} is *₹${amount}*.%0A%0APlease ignore if already paid. Thank you! ⚽`;
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  };

  // ==================== EVENT LISTENERS ====================
  document.getElementById('btn-open-fees').onclick = () => {
    const batch = document.getElementById('batch-name').value;
    if (!batch) {
        showToast('Please select a Group first!', 'error');
        return;
    }

    const price = pricingByBatch[batch] || 0;
    const students = studentsByBatch[batch] || [];
    const container = document.getElementById('fees-list-container');
    const section = document.getElementById('fee-tracker-section');

    document.getElementById('fee-batch-label').textContent = `Group: ${batch} (₹${price}/month)`;
    
    container.innerHTML = students.map(name => `
      <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/5 hover:border-white/10 transition-all">
        <div>
          <p class="text-xs font-bold text-white">${name}</p>
          <p class="text-[10px] text-amber-500 font-bold uppercase tracking-widest mt-0.5">₹${price}</p>
        </div>
        <button onclick="window.sendReminder('${name}', ${price})" class="px-4 py-2 rounded-xl bg-green-500/10 text-green-500 text-[9px] font-bold uppercase border border-green-500/20 hover:bg-green-500 hover:text-white transition-all">
          Remind
        </button>
      </div>
    `).join('');

    section.classList.remove('hidden');
    section.scrollIntoView({ behavior: 'smooth' });
  };

  document.getElementById('btn-coach-attendance').onclick = () => {
    const date = document.getElementById('attendance-date').value;
    if (!date) {
      showToast('Please select a date first!', 'error');
      return;
    }
    
    // Initialize all coaches as absent
    coachAttendance = {};
    coaches.forEach(name => coachAttendance[name] = 'absent');
    
    document.getElementById('coach-section').classList.remove('hidden');
    renderCoaches();
    document.getElementById('coach-section').scrollIntoView({ behavior: 'smooth' });
  };

  document.getElementById('btn-load').onclick = () => {
    const coach = document.getElementById('coach-name').value;
    const batch = document.getElementById('batch-name').value;
    const date = document.getElementById('attendance-date').value;
    
    if (!coach || !batch || !date) {
      showToast('Please fill all fields', 'error');
      return;
    }
    
    currentSession = { coach, batch, date };
    sessionAttendance = {};
    
    const students = studentsByBatch[batch] || [];
    students.forEach(name => sessionAttendance[name] = 'absent');
    
    document.getElementById('students-section').classList.remove('hidden');
    renderGrid();
    document.getElementById('students-section').scrollIntoView({ behavior: 'smooth' });
  };

  document.getElementById('btn-save').onclick = async () => {
    const btn = document.getElementById('btn-save');
    
    if (!config.scriptUrl || !config.sheetId) {
      showToast('Please configure settings first', 'error');
      return;
    }
    
    btn.disabled = true; 
    btn.textContent = 'Saving...';
    
    // Format for Attendance sheet (6 columns)
    const records = Object.entries(sessionAttendance).map(([name, status]) => ({
      timestamp: new Date().toLocaleString(), 
      date: currentSession.date, 
      coach: currentSession.coach, 
      batch: currentSession.batch, 
      student_name: name, 
      status: status
    }));
    
    debugLog('Saving student attendance:', records);
    
    const res = await callSheetsAPI({ 
      action: 'append', 
      spreadsheetId: config.sheetId, 
      sheetName: config.sheetName, 
      data: records 
    });
    
    btn.disabled = false; 
    btn.textContent = 'Save Attendance';
    
    if (res && res.result === 'success') { 
      showToast(`✅ Saved ${records.length} attendance records!`); 
      document.getElementById('students-section').classList.add('hidden'); 
      
      // Clear the attendance
      sessionAttendance = {};
      
      // Refresh records display
      refreshRecords(); 
    } else { 
      showToast('❌ Error saving: ' + (res?.message || 'Unknown error'), 'error'); 
    }
  };

  document.getElementById('btn-save-coach').onclick = async () => {
    const btn = document.getElementById('btn-save-coach');
    const date = document.getElementById('attendance-date').value;
    
    if (!date) {
      showToast('Please select a date', 'error');
      return;
    }
    
    if (!config.scriptUrl || !config.sheetId) {
      showToast('Please configure settings first', 'error');
      return;
    }
    
    btn.disabled = true; 
    btn.textContent = 'Saving...';
    
    // Format for Coach_Attendance sheet (5 columns)
    // IMPORTANT: No student_name field here!
    const records = Object.entries(coachAttendance).map(([name, status]) => ({
      timestamp: new Date().toLocaleString(),
      date: date,
      batch: 'COACHES/STAFF',        // This goes to "Batch Name" column
      coach: name,                    // This goes to "Coach Name" column
      status: status                  // This goes to "Status" column
    }));
    
    debugLog('Saving coach attendance (5 columns):', records);
    
    const res = await callSheetsAPI({ 
      action: 'append', 
      spreadsheetId: config.sheetId, 
      sheetName: 'Coach_Attendance',  // Use exact sheet name
      data: records 
    });
    
    btn.disabled = false; 
    btn.textContent = 'Save Coach Attendance';
    
    if (res && res.result === 'success') { 
      showToast(`✅ Saved ${records.length} coach attendance records!`); 
      document.getElementById('coach-section').classList.add('hidden');
      
      // Clear coach attendance
      coachAttendance = {};
      
      // Refresh records display
      refreshRecords();
    } else { 
      showToast('❌ Error saving: ' + (res?.message || 'Unknown error'), 'error'); 
    }
  };

  document.getElementById('save-config').onclick = () => {
    const scriptUrl = document.getElementById('script-url').value.trim();
    const sheetId = document.getElementById('sheet-id').value.trim();
    const sheetName = document.getElementById('sheet-name').value.trim();
    
    if (!scriptUrl || !sheetId || !sheetName) {
      showToast('Please fill all fields', 'error');
      return;
    }
    
    config.scriptUrl = scriptUrl;
    config.sheetId = sheetId;
    config.sheetName = sheetName;
    
    document.getElementById('sheets-config').classList.add('hidden');
    showToast('✅ Settings saved');
    
    // Test the connection
    testConnection();
  };
  
  async function testConnection() {
    const res = await callSheetsAPI({ 
      action: 'test', 
      spreadsheetId: config.sheetId 
    });
    
    if (res && res.result === 'success') {
      showToast('✅ Connected to Google Sheets!');
      refreshRecords();
    } else {
      showToast('⚠️ Settings saved but connection test failed', 'error');
    }
  }

  document.getElementById('toggle-config').onclick = () => {
    document.getElementById('sheets-config').classList.toggle('hidden');
  };
  
  document.getElementById('btn-cancel').onclick = () => { 
    document.getElementById('students-section').classList.add('hidden'); 
    window.scrollTo({ top: 0, behavior: 'smooth' }); 
  };
  
  document.getElementById('btn-cancel-coach').onclick = () => { 
    document.getElementById('coach-section').classList.add('hidden'); 
  };

  async function refreshRecords() {
    if (!config.scriptUrl || !config.sheetId) return;
    
    const list = document.getElementById('attendance-list');
    list.innerHTML = '<div class="p-10 text-center text-slate-500 text-[10px] font-bold animate-pulse">LOADING...</div>';
    
    const res = await callSheetsAPI({ 
      action: 'read', 
      spreadsheetId: config.sheetId, 
      sheetName: config.sheetName, 
      limit: 10 
    });
    
    if (res && res.records && res.records.length > 0) {
      list.innerHTML = res.records.map(r => `
        <div class="flex items-center justify-between px-6 py-4 hover:bg-white/5 transition-all">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center text-[8px] font-black text-slate-600 border border-white/5">${r.student_name ? r.student_name.substring(0,2).toUpperCase() : 'NA'}</div>
            <div>
              <p class="text-xs font-bold text-white">${r.student_name || 'Unknown'}</p>
              <p class="text-[8px] text-slate-500 font-bold uppercase">${r.batch || 'No batch'} • ${r.date || ''}</p>
            </div>
          </div>
          <div class="px-3 py-1 rounded-md text-[8px] font-bold uppercase ${r.status === 'present' ? 'text-green-500 bg-green-500/10' : 'text-red-500 bg-red-500/10'}">${r.status || 'unknown'}</div>
        </div>
      `).join('');
    } else {
      list.innerHTML = '<div class="p-10 text-center text-slate-600 text-xs">No records found. Start by saving attendance!</div>';
    }
  }

  // Initialize
  document.getElementById('attendance-date').valueAsDate = new Date();
  
  // Load saved config from localStorage if available
  try {
    const savedConfig = localStorage.getItem('coffeeland_config');
    if (savedConfig) {
      const parsed = JSON.parse(savedConfig);
      config = { ...config, ...parsed };
      document.getElementById('script-url').value = config.scriptUrl;
      document.getElementById('sheet-id').value = config.sheetId;
      document.getElementById('sheet-name').value = config.sheetName;
    }
  } catch (e) {
    console.log('No saved config');
  }
  
  // Save config to localStorage when changed
  document.getElementById('save-config').onclick = () => {
    const scriptUrl = document.getElementById('script-url').value.trim();
    const sheetId = document.getElementById('sheet-id').value.trim();
    const sheetName = document.getElementById('sheet-name').value.trim();
    
    if (!scriptUrl || !sheetId || !sheetName) {
      showToast('Please fill all fields', 'error');
      return;
    }
    
    config.scriptUrl = scriptUrl;
    config.sheetId = sheetId;
    config.sheetName = sheetName;
    
    // Save to localStorage
    localStorage.setItem('coffeeland_config', JSON.stringify(config));
    
    document.getElementById('sheets-config').classList.add('hidden');
    showToast('✅ Settings saved');
    
    // Test the connection
    testConnection();
  };
})();
</script>
</body>
</html>
