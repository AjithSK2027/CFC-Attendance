<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CFC | Attendance Pro v5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F9FAFB; color: #111827; }
        @media (prefers-color-scheme: dark) { body { background-color: #050505; color: #E5E7EB; } }
        .hidden-view { display: none !important; }
        .switch input { display: none; }
        .slider { width: 44px; height: 22px; background-color: rgba(244, 63, 94, 0.15); border-radius: 20px; position: relative; transition: .3s; }
        .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #F43F5E; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: rgba(16, 185, 129, 0.2); }
        input:checked + .slider:before { transform: translateX(22px); background-color: #10B981; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-inherit z-50 border-b border-black/5">
        <h1 onclick="goHome()" class="text-xl font-extrabold uppercase cursor-pointer">CFC <span class="text-emerald-500">ATTENDANCE MANAGER</span></h1>
        <button onclick="showEditView()" class="bg-blue-500/10 text-blue-500 text-[10px] font-bold px-4 py-2 rounded-xl uppercase">📝 Edit Logs</button>
    </header>

    <div id="lobbyView" class="px-6 space-y-6 mt-6">
        <div class="space-y-4">
            <select id="homeBatchSelect" onchange="selectBatch(this.value)" class="bg-white dark:bg-zinc-900 border border-black/10 p-4 text-xs font-bold w-full rounded-xl">
                <option value="">Quick Select Batch...</option>
            </select>
            <button onclick="markGlobalHoliday()" class="w-full bg-rose-500/10 text-rose-500 border border-rose-500/20 font-black py-4 rounded-2xl text-[10px] uppercase">🌴 Global Holiday (Today)</button>
        </div>
        <div id="batchGrid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="commandView" class="hidden-view px-6 space-y-8 mt-6">
        <div class="flex gap-3">
            <select id="batchSelect" onchange="fetchRoster()" class="bg-white dark:bg-zinc-900 border border-black/10 p-4 text-xs font-bold rounded-xl flex-1"></select>
            <input type="date" id="attendanceDate" onchange="fetchRoster()" class="bg-white dark:bg-zinc-900 border border-black/10 p-4 text-xs font-bold rounded-xl w-1/3">
        </div>

        <section class="space-y-3">
            <div class="flex justify-between items-center bg-blue-500/5 p-3 rounded-xl">
                <h3 class="text-[10px] font-bold uppercase text-blue-500">Coaches</h3>
                <div class="flex gap-4">
                    <button onclick="toggleAll('attendance_coach', true)" class="text-[9px] font-bold">ALL</button>
                    <button onclick="toggleAll('attendance_coach', false)" class="text-[9px] font-bold text-gray-400">CLEAR</button>
                </div>
            </div>
            <div id="coachesList" class="space-y-2"></div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-center bg-emerald-500/5 p-3 rounded-xl">
                <h3 class="text-[10px] font-bold uppercase text-emerald-500">Athletes</h3>
                <div class="flex gap-4">
                    <button onclick="toggleAll('attendance_student', true)" class="text-[9px] font-bold">ALL</button>
                    <button onclick="toggleAll('attendance_student', false)" class="text-[9px] font-bold text-gray-400">CLEAR</button>
                </div>
            </div>
            <div id="studentsList" class="space-y-2"></div>
        </section>

        <button onclick="submitAttendance()" id="submitBtn" class="w-full bg-emerald-500 text-white font-extrabold py-5 rounded-2xl uppercase text-sm shadow-xl">Commit Records</button>
    </div>

    <div id="editView" class="hidden-view px-6 space-y-4 mt-6">
        <div class="flex items-center justify-between">
            <h2 class="text-xs font-black uppercase text-gray-500">Log Editor</h2>
            <button onclick="goHome()" class="text-xs font-bold text-emerald-500">Close</button>
        </div>

        <div class="flex gap-3">
            <input type="date" id="editDate" onchange="loadDailyLogs()" class="bg-white dark:bg-zinc-900 border border-black/10 p-4 text-xs font-bold rounded-xl flex-1">
            <select id="editBatchSelect" onchange="loadDailyLogs()" class="bg-white dark:bg-zinc-900 border border-black/10 p-4 text-xs font-bold rounded-xl w-1/2">
                <option value="">All Batches</option>
            </select>
        </div>

        <section class="space-y-3">
            <div class="flex justify-between items-center bg-emerald-500/5 p-3 rounded-xl">
                <h3 class="text-[10px] font-bold uppercase text-emerald-500">Athletes</h3>
                <span id="studentLogCount" class="text-[10px] font-bold text-gray-400">0</span>
            </div>
            <div id="studentLogContainer" class="space-y-2"></div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-center bg-blue-500/5 p-3 rounded-xl">
                <h3 class="text-[10px] font-bold uppercase text-blue-500">Coaches</h3>
                <span id="coachLogCount" class="text-[10px] font-bold text-gray-400">0</span>
            </div>
            <div id="coachLogContainer" class="space-y-2 pb-20"></div>
        </section>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxgMe6bq7AgcCmEI5-x0C1LkbI4NFNJo32OKioqgcwBHujTt3KsC2aMeUZy_CrkPEjE-A/exec";

        document.getElementById('attendanceDate').valueAsDate = new Date();
        window.onload = loadBatches;

        async function loadBatches() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getBatches`);
                const data = await res.json();

                const grid = document.getElementById('batchGrid');
                const homeSelect = document.getElementById('homeBatchSelect');
                const batchSelect = document.getElementById('batchSelect');
                const editBatchSelect = document.getElementById('editBatchSelect');

                grid.innerHTML = '';
                homeSelect.innerHTML = '<option value="">Quick Select Batch...</option>';
                batchSelect.innerHTML = '<option value="">Select Batch...</option>';
                editBatchSelect.innerHTML = '<option value="">All Batches</option>';

                (data.batches || []).forEach(b => {
                    const name = String(b.name || '').trim();

                    homeSelect.innerHTML += `<option value="${escapeAttr(name)}">${escapeHtml(name)}</option>`;
                    batchSelect.innerHTML += `<option value="${escapeAttr(name)}">${escapeHtml(name)}</option>`;
                    editBatchSelect.innerHTML += `<option value="${escapeAttr(name)}">${escapeHtml(name)}</option>`;

                    grid.innerHTML += `
                        <div onclick='selectBatch(${JSON.stringify(name)})' class="bg-white dark:bg-zinc-900 border border-black/5 p-6 rounded-[2.5rem] flex flex-col justify-between aspect-square active:scale-95 transition-all">
                            <div class="text-xl">⚽</div>
                            <div>
                                <h3 class="text-sm font-extrabold uppercase leading-tight">${escapeHtml(name)}</h3>
                                <p class="text-[10px] text-emerald-500 font-bold mt-1">${Number(b.count || 0)} Active</p>
                            </div>
                        </div>`;
                });
            } catch (err) {
                alert("Unable to load batches.");
            }
        }

        function selectBatch(batchName) {
            if (!batchName) return;
            document.getElementById('batchSelect').value = batchName;
            fetchRoster();
        }

        function goHome() {
            document.getElementById('lobbyView').classList.remove('hidden-view');
            document.getElementById('commandView').classList.add('hidden-view');
            document.getElementById('editView').classList.add('hidden-view');
        }

        function showEditView() {
            document.getElementById('lobbyView').classList.add('hidden-view');
            document.getElementById('commandView').classList.add('hidden-view');
            document.getElementById('editView').classList.remove('hidden-view');

            document.getElementById('editDate').valueAsDate = new Date();

            const activeBatch = document.getElementById('batchSelect').value;
            if (activeBatch) {
                document.getElementById('editBatchSelect').value = activeBatch;
            }

            loadDailyLogs();
        }

        async function fetchRoster() {
            const batchName = document.getElementById('batchSelect').value;
            const date = document.getElementById('attendanceDate').value;

            if (!batchName) return;

            document.getElementById('lobbyView').classList.add('hidden-view');
            document.getElementById('editView').classList.add('hidden-view');
            document.getElementById('commandView').classList.remove('hidden-view');
            document.getElementById('studentsList').innerHTML = '<p class="text-center py-10 animate-pulse text-xs font-bold text-emerald-500">Loading Roster...</p>';
            document.getElementById('coachesList').innerHTML = '<p class="text-center py-10 animate-pulse text-xs font-bold text-blue-500">Loading Coaches...</p>';

            try {
                const res = await fetch(`${WEB_APP_URL}?action=getRoster&batchName=${encodeURIComponent(batchName)}&date=${encodeURIComponent(date)}`);
                const data = await res.json();

                renderList('coachesList', data.coaches || [], 'coach');
                renderList('studentsList', data.students || [], 'student');

                const btn = document.getElementById('submitBtn');
                btn.innerText = data.isLogged ? "Update Records" : "Commit Records";
                btn.className = data.isLogged
                    ? "w-full bg-blue-600 text-white font-extrabold py-5 rounded-2xl uppercase text-sm"
                    : "w-full bg-emerald-500 text-white font-extrabold py-5 rounded-2xl uppercase text-sm shadow-xl";
                btn.disabled = false;
            } catch (err) {
                alert("Unable to load roster.");
            }
        }

        function renderList(id, people, type) {
            document.getElementById(id).innerHTML = people.map(p => `
                <div class="bg-white dark:bg-zinc-900 border border-black/5 rounded-xl p-4 flex justify-between items-center">
                    <p class="font-bold text-sm">${escapeHtml(p.name)}</p>
                    <label class="switch">
                        <input
                            type="checkbox"
                            name="attendance_${type}"
                            value="${escapeAttr(p.name)}"
                            data-row-id="${p.rowId || ''}"
                            ${p.status === 'Present' ? 'checked' : ''}>
                        <div class="slider"></div>
                    </label>
                </div>
            `).join('');
        }

        async function loadDailyLogs() {
            const date = document.getElementById('editDate').value;
            const batch = document.getElementById('editBatchSelect').value;

            const studentContainer = document.getElementById('studentLogContainer');
            const coachContainer = document.getElementById('coachLogContainer');

            studentContainer.innerHTML = '<p class="text-center py-10 animate-pulse text-xs text-emerald-500 uppercase font-bold">Loading athlete logs...</p>';
            coachContainer.innerHTML = '<p class="text-center py-10 animate-pulse text-xs text-blue-500 uppercase font-bold">Loading coach logs...</p>';

            try {
                const res = await fetch(`${WEB_APP_URL}?action=getDailyLogs&date=${encodeURIComponent(date)}&batchName=${encodeURIComponent(batch)}`);
                const data = await res.json();

                const studentLogs = (data.logs || [])
                    .filter(l => l.type === 'student')
                    .sort((a, b) => String(a.batch).localeCompare(String(b.batch)) || String(a.name).localeCompare(String(b.name)));

                const coachLogs = (data.logs || [])
                    .filter(l => l.type === 'coach')
                    .sort((a, b) => String(a.batch).localeCompare(String(b.batch)) || String(a.name).localeCompare(String(b.name)));

                document.getElementById('studentLogCount').innerText = studentLogs.length;
                document.getElementById('coachLogCount').innerText = coachLogs.length;

                renderDailyLogCards('studentLogContainer', studentLogs, 'No athlete records found for this selection.');
                renderDailyLogCards('coachLogContainer', coachLogs, 'No coach records found for this selection.');
            } catch (err) {
                studentContainer.innerHTML = '<p class="text-center py-10 text-rose-500 text-xs font-bold">Unable to load athlete logs.</p>';
                coachContainer.innerHTML = '<p class="text-center py-10 text-rose-500 text-xs font-bold">Unable to load coach logs.</p>';
                document.getElementById('studentLogCount').innerText = '0';
                document.getElementById('coachLogCount').innerText = '0';
            }
        }

        function renderDailyLogCards(containerId, logs, emptyMessage) {
            const container = document.getElementById(containerId);

            if (!logs.length) {
                container.innerHTML = `<p class="text-center py-10 text-gray-500 text-xs">${escapeHtml(emptyMessage)}</p>`;
                return;
            }

            container.innerHTML = logs.map(l => `
                <div class="bg-white dark:bg-zinc-900 border border-black/5 p-4 rounded-xl flex justify-between items-center">
                    <div class="text-[10px] uppercase font-bold opacity-50">
                        ${escapeHtml(l.batch)}<br>
                        <span class="text-xs text-current font-bold">${escapeHtml(l.name)}</span>
                    </div>
                    <button
                        onclick='fastToggle(${Number(l.rowId)}, ${JSON.stringify(l.type)}, ${JSON.stringify(l.batch)}, ${JSON.stringify(l.name)}, ${JSON.stringify(l.status)})'
                        class="px-4 py-2 rounded-lg text-[10px] font-black uppercase ${l.status === 'Present' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}">
                        ${escapeHtml(l.status)}
                    </button>
                </div>
            `).join('');
        }

        async function fastToggle(rowId, type, batch, name, status) {
            const payload = {
                action: 'saveAttendance',
                data: [{
                    rowId,
                    personType: type,
                    date: document.getElementById('editDate').value,
                    batchName: batch,
                    personName: name,
                    status: status === 'Present' ? 'Absent' : 'Present'
                }]
            };

            const formData = new URLSearchParams();
            formData.append('payload', JSON.stringify(payload));

            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: formData, redirect: 'follow' });
                const out = await res.json();
                if (out.status === 'success') {
                    loadDailyLogs();
                } else {
                    alert("Unable to update log.");
                }
            } catch (err) {
                alert("Unable to update log.");
            }
        }

        function toggleAll(name, state) {
            document.querySelectorAll(`input[name="${name}"]`).forEach(c => c.checked = state);
        }

        async function submitAttendance() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Syncing...";

            const records = [];

            ['coach', 'student'].forEach(type => {
                document.querySelectorAll(`input[name="attendance_${type}"]`).forEach(i => {
                    records.push({
                        rowId: i.dataset.rowId ? Number(i.dataset.rowId) : null,
                        personType: type,
                        date: document.getElementById('attendanceDate').value,
                        batchName: document.getElementById('batchSelect').value,
                        personName: i.value,
                        status: i.checked ? 'Present' : 'Absent'
                    });
                });
            });

            const formData = new URLSearchParams();
            formData.append('payload', JSON.stringify({ action: 'saveAttendance', data: records }));

            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: formData, redirect: 'follow' });
                const out = await res.json();

                if (out.status === 'success') {
                    alert("Attendance Synced!");
                    goHome();
                } else {
                    alert("Sync failed.");
                    btn.disabled = false;
                    btn.innerText = "Commit Records";
                }
            } catch (err) {
                alert("Sync failed.");
                btn.disabled = false;
                btn.innerText = "Commit Records";
            }
        }

        async function markGlobalHoliday() {
            if (!confirm("Holiday for all batches today?")) return;

            const today = new Date();
            const date = [
                today.getFullYear(),
                String(today.getMonth() + 1).padStart(2, '0'),
                String(today.getDate()).padStart(2, '0')
            ].join('-');

            try {
                const res = await fetch(`${WEB_APP_URL}?action=getBatches`);
                const data = await res.json();

                const records = (data.batches || []).map(b => ({
                    personType: 'student',
                    date,
                    batchName: b.name,
                    personName: "--- HOLIDAY ---",
                    status: "Holiday"
                }));

                const formData = new URLSearchParams();
                formData.append('payload', JSON.stringify({ action: 'saveAttendance', data: records }));

                await fetch(WEB_APP_URL, { method: 'POST', body: formData, redirect: 'follow' });

                alert("Global Holiday Set!");
                location.reload();
            } catch (err) {
                alert("Unable to set holiday.");
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttr(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
